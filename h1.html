<!DOCTYPE html>

<script>
    // التحقق من تسجيل الدخول + إدارة الجلسة بتحسين
    const SESSION_MAX_IDLE_MINUTES = 30;

    function autoLogout() {
        alert('⚠️ تم تسجيل الخروج تلقائياً لعدم النشاط');
        localStorage.clear();
        window.location.href = 'login.html';
    }

    function resetLogoutTimer() {
        clearTimeout(window._logoutTimer);
        const now = Date.now();
        localStorage.setItem('lastActivity', now.toString());
        window._logoutTimer = setTimeout(autoLogout, SESSION_MAX_IDLE_MINUTES * 60 * 1000);
    }

    // عند تحميل الصفحة: تحقق من آخر نشاط
    (function checkSession() {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        if (!isLoggedIn) {
            window.location.href = 'login.html';
            return;
        }
        const lastActivity = parseInt(localStorage.getItem('lastActivity') || '0', 10);
        const now = Date.now();
        const diffMinutes = (now - lastActivity) / (1000 * 60);
        if (lastActivity && diffMinutes > SESSION_MAX_IDLE_MINUTES) {
            autoLogout();
            return;
        }
        // بدء المؤقت للأمام
        resetLogoutTimer();
        document.addEventListener('mousemove', resetLogoutTimer);
        document.addEventListener('keypress', resetLogoutTimer);
        document.addEventListener('click', resetLogoutTimer);
        document.addEventListener('scroll', resetLogoutTimer);
    })();
</script>

        const firebaseConfig = {

        let products = [];

        let offerSettings = {

        /* توست عام */
        function showToast(message, type = 'success') {
            const toast = document.querySelector('.toast-message');
            if (!toast) return;
            toast.textContent = message;
            toast.style.background = type === 'error' ? '#c62828' : 'var(--main)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        /* تسجيل الزيارة */
        async function recordVisit() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const visitRef = doc(db, "analytics", "visits");
                const visitSnap = await getDoc(visitRef);
                
                let visits = {};
                if (visitSnap.exists()) {
                    visits = visitSnap.data();
                }
                
                visits[today] = (visits[today] || 0) + 1;
                await setDoc(visitRef, visits);
                loadVisitorsData();
            } catch (error) {
                console.error('خطأ في تسجيل الزيارة:', error);
            }
        }

        /* تحميل بيانات الزوار */
        async function loadVisitorsData() {
            try {
                const visitRef = doc(db, "analytics", "visits");
                const visitSnap = await getDoc(visitRef);
                
                if (visitSnap.exists()) {
                    const visits = visitSnap.data();
                    visitorsData = [];
                    const today = new Date();
                    for (let i = 6; i >= 0; i--) {
                        const date = new Date(today);
                        date.setDate(date.getDate() - i);
                        const dateStr = date.toISOString().split('T')[0];
                        visitorsData.push({
                            date: date.toLocaleDateString('ar-SA'),
                            visitors: visits[dateStr] || 0,
                            pageViews: Math.floor((visits[dateStr] || 0) * 2.5)
                        });
                    }
                } else {
                    visitorsData = generateMockVisitorsData();
                }

                const viewsRef = doc(db, "analytics", "productViews");
                const viewsSnap = await getDoc(viewsRef);
                if (viewsSnap.exists()) {
                    productsViews = viewsSnap.data();
                }

                updateVisitorsStats();
                updateTopProducts();
                updateVisitorsChart();
            } catch (error) {
                console.error('خطأ في تحميل بيانات الزوار:', error);
                visitorsData = generateMockVisitorsData();
            }
        }

        function generateMockVisitorsData() {
            const data = [];
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                data.push({
                    date: date.toLocaleDateString('ar-SA'),
                    visitors: Math.floor(Math.random() * 50) + 30,
                    pageViews: Math.floor(Math.random() * 100) + 50
                });
            }
            return data;
        }

        async function recordProductView(productId) {
            try {
                const viewsRef = doc(db, "analytics", "productViews");
                const viewsSnap = await getDoc(viewsRef);
                
                let views = {};
                if (viewsSnap.exists()) {
                    views = viewsSnap.data();
                }
                
                views[productId] = (views[productId] || 0) + 1;
                await setDoc(viewsRef, views);
                productsViews = views;
            } catch (error) {
                console.error('خطأ في تسجيل المشاهدة:', error);
            }
        }

        function updateVisitorsStats() {
            const totalVisitors = visitorsData.reduce((sum, day) => sum + day.visitors, 0);
            const totalPageViews = visitorsData.reduce((sum, day) => sum + day.pageViews, 0);
            const avgVisitors = visitorsData.length ? Math.round(totalVisitors / visitorsData.length) : 0;

            const totalVisitorsEl = document.getElementById('totalVisitors');
            const avgVisitorsEl = document.getElementById('avgVisitors');
            const totalPageViewsEl = document.getElementById('totalPageViews');
            
            if (totalVisitorsEl) totalVisitorsEl.textContent = totalVisitors;
            if (avgVisitorsEl) avgVisitorsEl.textContent = avgVisitors;
            if (totalPageViewsEl) totalPageViewsEl.textContent = totalPageViews;

            const trend = document.getElementById('visitorsTrend');
            if (trend && visitorsData.length >= 2) {
                const lastDay = visitorsData[visitorsData.length - 1].visitors;
                const prevDay = visitorsData[visitorsData.length - 2].visitors;
                const change = prevDay ? ((lastDay - prevDay) / prevDay * 100).toFixed(1) : 0;
                trend.textContent = `${change > 0 ? '+' : ''}${change}%`;
                trend.style.color = change > 0 ? '#2e7d32' : '#c62828';
            }
        }

        /* إحصائيات المنتجات */
        function updateProductsStats() {
            const total = products.length;
            const active = products.filter(p => p.active !== false).length;
            const inactive = total - active;
            const totalEl = document.getElementById('totalProducts');
            const activeEl = document.getElementById('activeProducts');
            const inactiveEl = document.getElementById('inactiveProducts');
            if (totalEl) totalEl.textContent = total;
            if (activeEl) activeEl.textContent = active;
            if (inactiveEl) inactiveEl.textContent = inactive;
        }

        function updateTopProducts() {
            const topProductsList = document.getElementById('topProductsList');
            if (!topProductsList) return;

            const viewsArray = Object.entries(productsViews).map(([id, views]) => {
                const product = products.find(p => p.id === id);
                if (!product) return null;
                return { ...product, views };
            }).filter(Boolean);

            viewsArray.sort((a, b) => (b.views || 0) - (a.views || 0));
            const top5 = viewsArray.slice(0, 5);

            topProductsList.innerHTML = '';

            if (top5.length === 0) {
                topProductsList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">لا توجد بيانات كافية بعد</div>';
                return;
            }

            top5.forEach(product => {
                const category = categories.find(c => c.id === product.category);
                const categoryName = category ? category.name : 'قسم';
                const imgSrc = product.image || 'https://via.placeholder.com/50';

                const item = document.createElement('div');
                item.className = 'top-product-item';
                item.onclick = () => openEditProductModal(product.id);
                item.innerHTML = `
                    <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/50'">
                    <div class="top-product-info">
                        <div class="top-product-name">${product.name || ''}</div>
                        <div class="top-product-category">${categoryName}</div>
                    </div>
                    <div class="top-product-stats">
                        <span class="top-product-views">👁️ ${product.views || 0}</span>
                        <span class="top-product-price">${product.price || 0} ريال</span>
                    </div>
                `;
                topProductsList.appendChild(item);
            });
        }

        function updateVisitorsChart() {
            const ctx = document.getElementById('visitorsChart');
            if (!ctx) return;

            if (visitorsChart) {
                visitorsChart.destroy();
            }

            visitorsChart = new Chart(ctx, {
                type: 'line',
                 {
                    labels: visitorsData.map(d => d.date),
                    datasets: [{
                        label: 'عدد الزوار',
                         visitorsData.map(d => d.visitors),
                        borderColor: '#2b3393',
                        backgroundColor: 'rgba(43, 51, 147, 0.1)',
                        tension: 0.4,
                        fill: true
                    }, {
                        label: 'مشاهدات الصفحات',
                         visitorsData.map(d => d.pageViews),
                        borderColor: '#f8c81c',
                        backgroundColor: 'rgba(248, 200, 28, 0.1)',

                        fill: true
                    }]
                },
                options: {

                        }

                    scales: {

                            beginAtZero: true,
                            grid: {
                                color: '#eef0ff'
                            }
                        }
                    }
                }
            });
        }

        /* تحميل إعدادات العروض والمنتجات الرئيسية */
        async function loadOfferSettings() {
            try {
                const docRef = doc(db, "settings", "offer");
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    offerSettings = { ...offerSettings, ...docSnap.data() };
                }
                
                const visibleCheckbox = document.getElementById('offerVisible');
                if (visibleCheckbox) visibleCheckbox.checked = offerSettings.visible;
                
                const badgeInput = document.getElementById('offerBadge');
                if (badgeInput) badgeInput.value = offerSettings.badge || '';
                
                const titleInput = document.getElementById('offerTitle');
                if (titleInput) titleInput.value = offerSettings.title || '';
                
                renderFeaturedProductsList();

                console.error('خطأ في تحميل إعدادات العروض:', error);
            }
        }

        async function saveOfferSettings() {
            try {
                const offerRef = doc(db, "settings", "offer");
                await setDoc(offerRef, offerSettings, { merge: true });
                showToast('تم حفظ إعدادات العروض بنجاح');

                console.error('خطأ في حفظ إعدادات العروض:', error);

        /* تحميل إعدادات السوشال */

        /* قائمة المنتجات الرئيسية في لوحة التحكم */
        function renderFeaturedProductsList() {
            const listContainer = document.getElementById('featuredProductsList');
            if (!listContainer) return;
            
            listContainer.innerHTML = '';
            
            if (!offerSettings.featuredProducts || offerSettings.featuredProducts.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">لا توجد منتجات رئيسية بعد</div>';
                return;
            }
            
            offerSettings.featuredProducts.forEach((product, index) => {
                const item = document.createElement('div');
                item.className = 'featured-product-item';
                item.innerHTML = `
                    <img src="${product.image || 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
                    <div class="info">
                        <div class="name">${product.name || ''}</div>
                        <div class="price">${product.price || 0} ريال</div>
                    </div>
                    <div class="featured-checkbox">
                        <input type="checkbox" ${product.visible !== false ? 'checked' : ''} onchange="toggleFeaturedProductVisibility(${index}, this.checked)">
                    </div>
                    <div class="actions">
                        <button class="edit" onclick="editFeaturedProduct(${index})"><i class="fas fa-edit"></i></button>
                        <button class="delete" onclick="deleteFeaturedProduct(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        window.toggleFeaturedProductVisibility = function(index, isVisible) {
            if (offerSettings.featuredProducts[index]) {
                offerSettings.featuredProducts[index].visible = isVisible;
            }
        };

        window.editFeaturedProduct = function(index) {
            const product = offerSettings.featuredProducts[index];
            if (!product) return;
            // هنا تربط الحقول داخل مودال تعديل المنتج الرئيسي
            const nameInput = document.getElementById('featuredName');
            const priceInput = document.getElementById('featuredPrice');
            const imageInput = document.getElementById('featuredImage');
            const descInput = document.getElementById('featuredDesc');
            const calInput = document.getElementById('featuredCalories');
            const timeInput = document.getElementById('featuredTime');
            const waInput = document.getElementById('featuredWhatsapp');
            const idxInput = document.getElementById('featuredProductIndex');
            if (nameInput) nameInput.value = product.name || '';
            if (priceInput) priceInput.value = product.price || '';
            if (imageInput) imageInput.value = product.image || '';
            if (descInput) descInput.value = product.desc || '';
            if (calInput) calInput.value = product.calories || '';
            if (timeInput) timeInput.value = product.time || '';
            if (waInput) waInput.value = product.whatsapp || '';
            if (idxInput) idxInput.value = index;
            const modal = document.getElementById('featuredModal');
            if (modal) modal.style.display = 'flex';
        };

        window.deleteFeaturedProduct = function(index) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج الرئيسي؟')) return;
            offerSettings.featuredProducts.splice(index, 1);
            renderFeaturedProductsList();
        };

        window.saveFeaturedProduct = function() {
            const idxInput = document.getElementById('featuredProductIndex');
            const index = idxInput ? parseInt(idxInput.value, 10) : -1;
            const nameInput = document.getElementById('featuredName');
            const priceInput = document.getElementById('featuredPrice');
            const imageInput = document.getElementById('featuredImage');
            const descInput = document.getElementById('featuredDesc');
            const calInput = document.getElementById('featuredCalories');
            const timeInput = document.getElementById('featuredTime');
            const waInput = document.getElementById('featuredWhatsapp');
            const data = {
                name: nameInput ? nameInput.value.trim() : '',
                price: priceInput ? priceInput.value.trim() : '',
                image: imageInput ? imageInput.value.trim() : '',
                desc: descInput ? descInput.value.trim() : '',
                calories: calInput ? calInput.value.trim() : '',
                time: timeInput ? timeInput.value.trim() : '',
                whatsapp: waInput ? waInput.value.trim() : '',
                visible: true
            };
            if (index >= 0 && offerSettings.featuredProducts[index]) {
                offerSettings.featuredProducts[index] = { ...offerSettings.featuredProducts[index], ...data };
            } else {
                offerSettings.featuredProducts.push(data);
            }
            const modal = document.getElementById('featuredModal');
            if (modal) modal.style.display = 'none';
            renderFeaturedProductsList();
        };

        window.closeFeaturedModal = function() {
            const modal = document.getElementById('featuredModal');
            if (modal) modal.style.display = 'none';
        };

        /* فلترة المنتجات (بحث/قسم/حالة) */
        function applyProductsFilters() {
            let filtered = [...products];
            if (currentFilterCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentFilterCategory);
            }
            if (currentFilterStatus === 'active') {
                filtered = filtered.filter(p => p.active !== false);
            } else if (currentFilterStatus === 'inactive') {
                filtered = filtered.filter(p => p.active === false);
            }
            if (currentSearchTerm) {
                const term = currentSearchTerm.toLowerCase();
                filtered = filtered.filter(p =>
                    (p.name || '').toLowerCase().includes(term) ||
                    (p.desc || '').toLowerCase().includes(term)
                );
            }
            renderProductsTable(filtered);
            renderRecentProductsPreview(filtered);
        }

        function renderProductsTable(list) {
            const tbody = document.getElementById('productsTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:15px;">لا توجد منتجات مطابقة</td></tr>';
                return;
            }
            list.forEach(p => {
                const tr = document.createElement('tr');
                const imgSrc = p.image || 'https://via.placeholder.com/40';
                const statusClass = p.active !== false ? 'status-active' : 'status-inactive';
                const statusText = p.active !== false ? 'مفعل' : 'مخفي';
                tr.innerHTML = `
                    <td><img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td>${p.name || ''}</td>
                    <td>${p.price || 0}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td class="checkbox-container">
                        <input type="checkbox" ${p.active !== false ? 'checked' : ''} onchange="toggleProductStatus('${p.id}', this.checked)">
                    </td>
                    <td>
                        <button class="action-btn edit-btn" onclick="openEditProductModal('${p.id}')"><i class="fas fa-edit"></i></button>
                        <button class="action-btn" onclick="confirmDeleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderRecentProductsPreview(list) {
            const container = document.getElementById('recentProductsPreview');
            if (!container) return;
            container.innerHTML = '';
            const slice = list.slice(0, 6);
            slice.forEach(p => {
                const card = document.createElement('div');
                card.className = 'preview-card ' + (p.active !== false ? '' : 'inactive');
                const imgSrc = p.image || 'https://via.placeholder.com/50';
                card.innerHTML = `
                    <span class="status-indicator ${p.active !== false ? 'active' : 'inactive'}"></span>
                    <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/50'">
                    <div class="preview-name">${p.name || ''}</div>
                    <div class="preview-price">${p.price || 0} ريال</div>
                `;
                card.onclick = () => openEditProductModal(p.id);
                container.appendChild(card);
            });
        }

        window.toggleProductStatus = async function(id, isActive) {
            try {
                const ref = doc(db, 'products', id);
                await updateDoc(ref, { active: isActive });
                const idx = products.findIndex(p => p.id === id);
                if (idx > -1) products[idx].active = isActive;
                applyProductsFilters();
                updateProductsStats();
            } catch (error) {
                console.error('خطأ في تحديث حالة المنتج:', error);
                showToast('حدث خطأ أثناء تحديث حالة المنتج', 'error');
            }
        };

        window.confirmDeleteProduct = function(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
            deleteProduct(id);
        };

        async function deleteProduct(id) {
            try {
                await deleteDoc(doc(db, 'products', id));
                products = products.filter(p => p.id !== id);
                applyProductsFilters();
                updateProductsStats();
                showToast('تم حذف المنتج بنجاح');
            } catch (error) {
                console.error('خطأ في حذف المنتج:', error);
                showToast('حدث خطأ أثناء حذف المنتج', 'error');
            }
        }

        window.openEditProductModal = function(id) {
            // هنا تربط مودال تعديل المنتج العادي (نفس شغلك السابق)
            // تركته فارغ لأنك لم ترفق كود المودال، فقط نادِيه من هنا
            console.log('openEditProductModal', id);
        };

        /* تحميل المنتجات والأقسام */
        async function loadCategories() {
            categories = [...defaultCategories];
            try {
                const snap = await getDocs(collection(db, 'categories'));
                snap.forEach(d => {
                    categories.push({ id: d.id, ...d.data() });
                });
            } catch (error) {
                console.error('خطأ في تحميل الأقسام:', error);
            }
        }

        async function loadProducts() {
            try {
                const q = query(collection(db, 'products'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                products = [];
                snap.forEach(d => {
                    products.push({ id: d.id, ...d.data() });
                });
                applyProductsFilters();
                updateProductsStats();
                updateTopProducts();
            } catch (error) {
                console.error('خطأ في تحميل المنتجات:', error);
            }
        }

        /* سلايدر المنتجات الرئيسية (عرض للمستخدم) */
        let currentSlide = 0;
        let autoSlideTimer;

        function buildFeaturedSlider() {
            const container = document.querySelector('.featured-slider-container');
            const wrapper = document.querySelector('.featured-slider-wrapper');
            const dotsContainer = document.querySelector('.featured-slider-dots');
            if (!container || !wrapper || !dotsContainer) return;

            wrapper.innerHTML = '';
            dotsContainer.innerHTML = '';

            const visibleProducts = (offerSettings.featuredProducts || []).filter(p => p.visible !== false);
            if (!offerSettings.visible || !visibleProducts.length) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'block';

            visibleProducts.forEach((p, index) => {
                const slide = document.createElement('div');
                slide.className = 'featured-slide';
                slide.innerHTML = `
                    <div class="featured-product-card">
                        <div class="featured-product-image">
                            <img src="${p.image || 'https://via.placeholder.com/200'}" onerror="this.src='https://via.placeholder.com/200'">
                        </div>
                        <div class="featured-product-info">
                            <div class="featured-product-title">${p.name || ''}</div>
                            <div class="featured-product-desc">${p.desc || ''}</div>
                            <div class="featured-price">${p.price || 0} ريال</div>
                            ${p.whatsapp ? `<a href="https://wa.me/${p.whatsapp}" target="_blank" class="featured-order-btn">اطلب الآن</a>` : ''}
                        </div>
                    </div>
                `;
                wrapper.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'featured-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(index);
                dotsContainer.appendChild(dot);
            });

            currentSlide = 0;
            startAutoSlide();
        }

        function goToSlide(index) {
            const wrapper = document.querySelector('.featured-slider-wrapper');
            const slides = document.querySelectorAll('.featured-slide');
            if (!wrapper || !slides.length) return;
            currentSlide = (index + slides.length) % slides.length;
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.featured-dot');
            dots.forEach((d, i) => {
                d.classList.toggle('active', i === currentSlide);
            });
        }

        function startAutoSlide() {
            clearInterval(autoSlideTimer);
            const slides = document.querySelectorAll('.featured-slide');
            if (!slides.length) return;
            autoSlideTimer = setInterval(() => {
                goToSlide(currentSlide + 1);
            }, 5000);
        }

        window.prevFeaturedSlide = function() {
            goToSlide(currentSlide - 1);
        };

        window.nextFeaturedSlide = function() {
            goToSlide(currentSlide + 1);
        };

        /* ربط الأحداث في الواجهة */
        document.addEventListener('DOMContentLoaded', () => {
            // تسجيل الزيارة
            recordVisit();
            loadVisitorsData();
            loadCategories();
            loadProducts();
            loadOfferSettings();
            loadSocialSettings();

            const offerVisible = document.getElementById('offerVisible');
            const offerBadge = document.getElementById('offerBadge');
            const offerTitle = document.getElementById('offerTitle');
            if (offerVisible) {
                offerVisible.addEventListener('change', (e) => {
                    offerSettings.visible = e.target.checked;
                });
            }
            if (offerBadge) {
                offerBadge.addEventListener('input', (e) => {
                    offerSettings.badge = e.target.value;
                });
            }
            if (offerTitle) {
                offerTitle.addEventListener('input', (e) => {
                    offerSettings.title = e.target.value;
                });
            }

            const searchInput = document.getElementById('searchProducts');
            const categorySelect = document.getElementById('filterCategory');
            const statusRadios = document.querySelectorAll('input[name="statusFilter"]');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    currentSearchTerm = e.target.value.trim();
                    applyProductsFilters();
                });
            }
            if (categorySelect) {
                categorySelect.addEventListener('change', (e) => {
                    currentFilterCategory = e.target.value;
                    applyProductsFilters();
                });
            }
            statusRadios.forEach(r => {
                r.addEventListener('change', (e) => {
                    currentFilterStatus = e.target.value;
                    applyProductsFilters();
                });
            });

            const saveOfferBtn = document.getElementById('btnSaveOfferSettings');
            if (saveOfferBtn) saveOfferBtn.addEventListener('click', () => {
                saveOfferSettings().then(buildFeaturedSlider);
            });

            const saveSocialBtn = document.getElementById('btnSaveSocial');
            if (saveSocialBtn) saveSocialBtn.addEventListener('click', saveSocialSettings);
        });
    </script>
</head>

    <!-- هنا تكمل باقي هيكل الصفحة (sidebar, main-content, الجداول, المودالات...) كما عندك -->
    <!-- مثال بسيط على التوست -->
    <div class="toast-message"></div>
</body>
