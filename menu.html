    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #f0f2fc; }
    ::-webkit-scrollbar-thumb { background: rgba(43,51,147,.25); border-radius: 3px; }
    html, body { margin: 0; padding: 0; }
    body { background: var(--light-bg); scroll-behavior: smooth; padding-bottom: 90px; }
    .cart-float { position: fixed; bottom: 22px; left: 22px; background: var(--main); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 24px rgba(43,51,147,.4); z-index: 1000; transition: var(--transition); border: 3px solid var(--secondary); }
    .cart-float:hover { transform: scale(1.1); box-shadow: 0 10px 30px rgba(43,51,147,.5); }
    .cart-float i { font-size: 22px; }
    .cart-count { position: absolute; top: -5px; right: -5px; background: var(--secondary); color: var(--main); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 2px solid white; }
    .cart-sidebar { position: fixed; top: 0; left: -400px; width: 380px; height: 100vh; background: white; box-shadow: -5px 0 30px rgba(0,0,0,.15); z-index: 2000; transition: left .3s ease; display: flex; flex-direction: column; }
    .cart-sidebar.active { left: 0; }
    .cart-header { background: var(--main); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .cart-header h3 { font-size: 20px; display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .cart-header button { background: rgba(255,255,255,.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: var(--transition); font-size: 1rem; }
    .cart-header button:hover { background: rgba(255,255,255,.3); transform: rotate(90deg); }
    .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
    .empty-cart { text-align: center; padding: 50px 20px; color: #bbb; }
    .empty-cart i { font-size: 64px; margin-bottom: 15px; color: #e0e3f0; display: block; }
    .empty-cart p { font-weight: 700; color: #999; font-size: 1rem; }
    .empty-cart small { color: #ccc; font-size: .85rem; }
    .cart-items { display: flex; flex-direction: column; gap: 12px; }
    .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #f8f9fa; border-radius: 12px; }
    .cart-item-img { width: 58px; height: 58px; border-radius: 10px; object-fit: cover; border: 2px solid #eef0ff; }
    .cart-item-details { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 700; color: var(--main); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { color: #888; font-size: 12px; margin-top: 3px; }
    .cart-item-quantity { display: flex; align-items: center; gap: 6px; }
    .cart-qty-btn { width: 28px; height: 28px; border: none; background: white; border-radius: 7px; cursor: pointer; font-weight: 700; color: var(--main); transition: var(--transition); font-size: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .cart-qty-btn:hover { background: var(--secondary); }
    .cart-qty-value { font-weight: 700; min-width: 22px; text-align: center; color: var(--main); font-size: .9rem; }
    .cart-item-remove { background: none; border: none; color: #ff5555; cursor: pointer; padding: 6px; opacity: .5; transition: var(--transition); font-size: .9rem; }
    .cart-item-remove:hover { opacity: 1; transform: scale(1.2); }
    .cart-footer { padding: 18px; border-top: 2px solid #f0f0f0; }
    .delivery-options { margin-bottom: 16px; }
    .delivery-options h4 { color: var(--main); margin-bottom: 10px; font-size: 15px; font-weight: 700; }
    .delivery-option { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding: 9px 12px; background: #f8f9fa; border-radius: 10px; cursor: pointer; flex-wrap: wrap; }
    .delivery-option input[type="radio"] { accent-color: var(--main); width: 16px; height: 16px; }
    .delivery-note { width: 100%; font-size: 12px; color: #e67e22; background: #fff3e0; padding: 8px 10px; border-radius: 7px; margin-top: 6px; margin-right: 26px; }
    .delivery-note i { margin-left: 4px; }
    .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding: 10px 0; border-top: 2px solid #eee; border-bottom: 2px solid #eee; font-weight: 700; color: var(--main); font-size: 1rem; }
    .send-whatsapp-btn { width: 100%; background: #25D366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); font-family: 'Cairo', sans-serif; }
    .send-whatsapp-btn:hover { background: #128C7E; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,211,102,.3); }
    .send-whatsapp-btn i { font-size: 20px; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 1999; display: none; backdrop-filter: blur(3px); }
    .overlay.active { display: block; }
    .notification { position: fixed; top: 22px; left: 50%; z-index: 3000; transform: translateX(-50%) translateY(-100px); background: white; color: var(--main); padding: 12px 24px; border-radius: 50px; box-shadow: 0 8px 30px rgba(0,0,0,.15); display: flex; align-items: center; gap: 10px; transition: transform .3s cubic-bezier(.4,0,.2,1); border-right: 4px solid #4CAF50; font-weight: 700; font-size: .9rem; white-space: nowrap; }
    .notification.show { transform: translateX(-50%) translateY(0); }
    .notification i { color: #4CAF50; font-size: 18px; }
    .sticky-header { position: sticky; top: 0; background: var(--main); z-index: 900; height: 90px; display: flex; justify-content: center; align-items: center; margin: 0; padding: 0; }
    .logo-container { text-align: center; padding: 6px 0 4px; }
    .logo-container img { max-height: 52px; width: auto; }
    .categories { display: flex; gap: 6px; overflow-x: auto; padding: 8px 12px; background: var(--main); scrollbar-width: none; position: sticky; top: 90px; z-index: 890; }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn { border: none; background: rgba(255,255,255,.15); padding: 8px 18px; border-radius: 30px; font-weight: 700; cursor: pointer; white-space: nowrap; font-size: 13px; color: rgba(255,255,255,.85); transition: var(--transition); flex-shrink: 0; font-family: 'Cairo', sans-serif; }
    .cat-btn:hover { background: rgba(255,255,255,.25); color: white; transform: translateY(-1px); }
    .cat-btn.active { background: var(--secondary); color: var(--main); }
    .container { max-width: 780px; margin: auto; padding: 16px 14px; }
    .offer-header { text-align: center; margin: 20px 0 16px; }
    .offer-badge { display: inline-block; background: #fff7d6; color: var(--main); font-weight: 700; padding: 5px 18px; border-radius: 30px; margin-bottom: 8px; font-size: .95rem; border: 1.5px solid var(--secondary); }
    .offer-title { font-size: 1.3rem; font-weight: 800; color: var(--main); line-height: 1.4; }
    .offer-line { width: 50px; height: 3px; background: var(--secondary); margin: 10px auto 0; border-radius: 5px; }
    .featured-slider-container { position: relative; width: 100%; margin: 16px 0 32px; border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; background: white; }
    .slider-overflow-wrap { overflow: hidden; border-radius: var(--radius) var(--radius) 0 0; }
    .featured-slider-wrapper { display: flex; transition: transform .45s cubic-bezier(.4,0,.2,1); width: 100%; will-change: transform; }
    .featured-slide { flex: 0 0 100%; width: 100%; }
    .featured-card { background: white; display: flex; flex-direction: column; align-items: stretch; }
    .featured-card-img-wrap { background: linear-gradient(145deg, #eef0ff 0%, #ffffff 100%); display: flex; align-items: center; justify-content: center; padding: 24px 20px 16px; }
    .featured-card-img-wrap img { width: 100%; max-width: 220px; height: 180px; border-radius: 14px; object-fit: cover; box-shadow: 0 8px 25px rgba(43,51,147,.15); }
    .featured-card-body { flex: 1; padding: 16px 20px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .featured-card-name { font-size: 1.15rem; font-weight: 800; color: var(--main); margin-bottom: 7px; }
    .featured-card-desc { color: #777; font-size: .82rem; line-height: 1.5; margin-bottom: 10px; }
    .featured-card-meta { display: flex; gap: 14px; margin-bottom: 12px; justify-content: center; }
    .featured-card-meta span { font-size: .78rem; color: #888; display: flex; align-items: center; gap: 4px; }
    .featured-card-meta i { color: var(--secondary); }
    .featured-card-footer { display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .featured-card-price { font-size: 1.6rem; font-weight: 800; color: var(--main); display: flex; align-items: center; gap: 6px; }
    .featured-card-price span { font-size: .8rem; color: #aaa; font-weight: 600; }
    .featured-card-actions { display: flex; align-items: center; gap: 8px; }
    .slider-nav-btn { background: white; border: 2px solid var(--secondary); color: var(--main); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); z-index: 10; font-size: .95rem; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .slider-nav-btn:hover { background: var(--secondary); }
    .featured-slider-dots { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 14px 0 6px; background: white; order: 2; flex: 1; }
    .featured-dot { width: 8px; height: 8px; border-radius: 50%; background: #e0e3f0; cursor: pointer; transition: var(--transition); }
    .featured-dot:hover { background: var(--secondary); }
    .featured-dot.active { background: var(--main); width: 22px; border-radius: 4px; }
    .slider-bottom-nav { display: flex; align-items: center; justify-content: center; gap: 10px; background: white; padding: 10px 16px 14px; border-top: 1px solid #f0f2ff; }
    .add-to-cart-btn { background: var(--main); color: white; border: none; padding: 9px 14px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: var(--transition); font-weight: 700; font-size: .82rem; font-family: 'Cairo', sans-serif; white-space: nowrap; }
    .add-to-cart-btn:hover { background: var(--main-light); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(43,51,147,.25); }
    .add-to-cart-small { background: var(--main); color: white; border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
    .add-to-cart-small:hover { background: var(--main-light); transform: scale(1.1); }
    .quantity-control { display: flex; align-items: center; background: #f0f2ff; border-radius: 20px; overflow: hidden; border: 1.5px solid rgba(43,51,147,.2); }
    .qty-btn { width: 24px; height: 24px; border: none; background: var(--main); color: white; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
    .qty-btn:hover { background: var(--secondary); color: var(--main); }
    .qty-value { min-width: 26px; text-align: center; font-weight: 700; color: var(--main); font-size: .82rem; }
    .section-wrapper { margin-bottom: 6px; }
    .section-heading { font-size: 1.15rem; font-weight: 800; color: var(--main); margin: 22px 0 0; padding: 14px 14px 14px 10px; border-right: 4px solid var(--secondary); background: white; border-radius: var(--radius-sm) var(--radius-sm) 0 0; display: flex; align-items: center; justify-content: space-between; }
    .section-heading .section-count { font-size: .72rem; color: #aaa; background: #f0f2ff; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .scroll-margin { scroll-margin-top: 150px; }
    .product-list { background: white; border-radius: 0 0 var(--radius-sm) var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 8px; }
    .product-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid #f5f5f5; transition: var(--transition); gap: 10px; }
    .product-row:last-child { border-bottom: none; }
    .product-row:hover { background: #fafbff; }
    .product-left { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; min-width: 0; }
    .product-img-wrap { position: relative; flex-shrink: 0; }
    .product-img-wrap img { width: 68px; height: 68px; border-radius: 12px; object-fit: cover; border: 2px solid #eef0ff; display: block; transition: var(--transition); }
    .product-left:hover .product-img-wrap img { border-color: var(--secondary); transform: scale(1.04); }
    .product-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
    .product-name { font-weight: 700; color: var(--main); font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-desc-sm { font-size: .72rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-meta-sm { font-size: .7rem; color: #bbb; display: flex; align-items: center; gap: 4px; }
    .product-meta-sm i { color: var(--secondary); font-size: .65rem; }
    .product-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; flex-shrink: 0; }
    .product-price { font-weight: 800; color: var(--main); font-size: .95rem; white-space: nowrap; text-align: left; }
    .product-price small { font-size: .72rem; color: #aaa; font-weight: 600; }
    .product-actions { display: flex; align-items: center; gap: 6px; }
    .skeleton-section { background: white; border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 22px; }
    .skeleton-header { height: 52px; background: linear-gradient(90deg, #eef0ff 25%, #e0e4ff 50%, #eef0ff 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    .skeleton-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid #f5f5f5; }
    .skeleton-img { width: 68px; height: 68px; border-radius: 12px; background: linear-gradient(90deg, #f0f2fc 25%, #e8ebf8 50%, #f0f2fc 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; flex-shrink: 0; }
    .skeleton-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg, #f0f2fc 25%, #e8ebf8 50%, #f0f2fc 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    .skeleton-line.w60 { width: 60%; } .skeleton-line.w40 { width: 40%; }
    .skeleton-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .skeleton-price { width: 55px; height: 16px; border-radius: 6px; background: linear-gradient(90deg, #f0f2fc 25%, #e8ebf8 50%, #f0f2fc 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    .skeleton-btn { width: 68px; height: 30px; border-radius: 20px; background: linear-gradient(90deg, #f0f2fc 25%, #e8ebf8 50%, #f0f2fc 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: all .22s ease; padding: 16px; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: white; width: 100%; max-width: 380px; border-radius: 24px; overflow: hidden; transform: scale(.92) translateY(10px); transition: transform .22s ease; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
    .modal-close { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,.9); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; color: var(--main); z-index: 10; border: none; transition: var(--transition); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .modal-close:hover { background: var(--secondary); transform: rotate(90deg); }
    .modal-image { background: linear-gradient(145deg, #eef0ff 0%, #fff 100%); padding: 28px 20px; text-align: center; }
    .modal-image img { width: 160px; max-width: 100%; border-radius: 16px; box-shadow: 0 8px 25px rgba(43,51,147,.15); }
    .modal-details { padding: 20px; }
    .modal-details h2 { color: var(--main); font-size: 1.3rem; font-weight: 800; margin-bottom: 10px; text-align: center; }
    .modal-meta { display: flex; justify-content: center; gap: 20px; margin: 8px 0 12px; color: #777; font-size: .88rem; }
    .modal-meta span { display: flex; align-items: center; gap: 5px; }
    .modal-meta i { color: var(--secondary); }

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARoaXISEB8yiCmes_EmZLhb-8ZtbwOR-k",
        authDomain: "dmorinig-f29d9.firebaseapp.com",
        projectId: "dmorinig-f29d9",
        storageBucket: "dmorinig-f29d9.firebasestorage.app",
        messagingSenderId: "813644062004",
        appId: "1:813644062004:web:e822278f6ee5f2f6f05961"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ═══════════════════════════════════════════
    // ✅ كاش البيانات (sessionStorage - 30 دقيقة)
    // يُقلل القراءات من Firebase بشكل كبير
    // ═══════════════════════════════════════════
    const CACHE_TTL = 30 * 60 * 1000; // 30 دقيقة

    function getMenuCache() {
        try {
            const raw = sessionStorage.getItem('menuCache');
            if (!raw) return null;
            const c = JSON.parse(raw);
            if (Date.now() - c.time > CACHE_TTL) { sessionStorage.removeItem('menuCache'); return null; }
            return c.data;
        } catch(e) { return null; }
    }

    function setMenuCache(data) {
        try { sessionStorage.setItem('menuCache', JSON.stringify({ data, time: Date.now() })); } catch(e) {}
    }

    // ✅ تسجيل الزيارة مرة واحدة فقط في اليوم (يوفر قراءة + كتابة Firebase)
    function shouldRecordVisit() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const last = sessionStorage.getItem('lastVisitDate');
            if (last === today) return false;
            sessionStorage.setItem('lastVisitDate', today);
            return true;
        } catch(e) { return true; }
    }

    function applyOfferSettings(s) {
        const offerSection = document.getElementById('offer-section');
        if (offerSection) offerSection.style.display = s.visible ? 'block' : 'none';
        const badgeEl = document.getElementById('offerBadge');
        const titleEl = document.getElementById('offerTitle');
        if (badgeEl) badgeEl.textContent = s.badge || '✨ عروضنا المميزة ✨';
        if (titleEl) titleEl.textContent = s.title || 'أفضل العروض لفترة محدودة';
    }

    function applySocialSettings(s) {
        ['Whatsapp','Instagram','Tiktok','Snapchat'].forEach(name => {
            const el = document.getElementById(`social${name}`);
            const key = name.toLowerCase();
            if (el && s[key]) el.href = s[key];
        });
    }

    // ═══════════════ STATE ═══════════════
    let cart = [];
    const whatsappNumber = "966595711777";
    let currentSlide = 0, totalSlides = 0, autoSlideInterval, isTransitioning = false;
    let sliderWrapper = null, dots = [], featuredProducts = [];

    // ═══════════════ CART ═══════════════
    function addToCart(product, quantity = 1) {
        const existing = cart.find(i => i.id === product.id);
        if (existing) { existing.quantity += quantity; }
        else { cart.push({ ...product, quantity }); }
        updateCartDisplay();
        showNotification(`تمت إضافة ${product.name} إلى السلة`);
    }

    function removeFromCart(productId) { cart = cart.filter(i => i.id !== productId); updateCartDisplay(); }
    function updateQuantity(productId, newQty) {
        if (newQty <= 0) { removeFromCart(productId); return; }
        const item = cart.find(i => i.id === productId);
        if (item) { item.quantity = newQty; updateCartDisplay(); }
    }

    function updateCartDisplay() {
        const cartItems = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');
        const emptyCart = document.getElementById('empty-cart');
        const cartContentItems = document.getElementById('cart-content-items');
        const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
        if (cartCount) { cartCount.textContent = totalItems; cartCount.style.display = totalItems > 0 ? 'flex' : 'none'; }
        if (cart.length === 0) {
            if (emptyCart) emptyCart.style.display = 'block';
            if (cartContentItems) cartContentItems.style.display = 'none';
        } else {
            if (emptyCart) emptyCart.style.display = 'none';
            if (cartContentItems) cartContentItems.style.display = 'block';
            if (cartItems) {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/60/2b3393/ffffff?text=img';">
                        <div class="cart-item-details"><div class="cart-item-name">${item.name}</div><div class="cart-item-price">${item.price} <span class="riyal-symbol">&#xE900;</span></div></div>
                        <div class="cart-item-quantity">
                            <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity - 1})">−</button>
                            <span class="cart-qty-value">${item.quantity}</span>
                            <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button>
                    </div>`).join('');
            }
            const total = cart.reduce((s, i) => s + (parseFloat(i.price) * i.quantity), 0);
            if (cartTotal) cartTotal.innerHTML = total.toFixed(2) + ' <span class="riyal-symbol">&#xE900;</span>';
        }
    }

    function showNotification(message) {
        const n = document.createElement('div');
        n.className = 'notification';
        n.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        document.body.appendChild(n);
        setTimeout(() => n.classList.add('show'), 10);
        setTimeout(() => { n.classList.remove('show'); setTimeout(() => n.remove(), 300); }, 2500);
    }

    window.sendOrderViaWhatsApp = function() {
        if (cart.length === 0) { showNotification('السلة فارغة! أضف منتجات أولاً'); return; }
        const deliveryMethod = document.querySelector('input[name="delivery"]:checked')?.value || 'استلام';
        const total = cart.reduce((s, i) => s + (parseFloat(i.price) * i.quantity), 0);
        let msg = '📋 *تفاصيل الطلب:*\n\n';
        cart.forEach(item => { const lt = (parseFloat(item.price) * item.quantity).toFixed(2); msg += `• ${item.name} × ${item.quantity} = ${lt} ر.س\n`; });
        msg += `\n💰 *إجمالي الطلب: ${total.toFixed(2)} ر.س*`;
        msg += `\n📦 *طريقة الاستلام:* ${deliveryMethod}`;
        if (deliveryMethod === 'توصيل') msg += `\n🚗 *ملاحظة:* سيتم احتساب رسوم التوصيل بعد تحديد الموقع`;
        window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
    };

    window.removeFromCart = removeFromCart;
    window.updateQuantity = updateQuantity;
    window.clearCart = function() { cart = []; updateCartDisplay(); };

    // ═══════════════════════════════════════════
    // ✅ تحميل البيانات مع الكاش
    // ═══════════════════════════════════════════
    async function loadProducts() {
        const cacheBadge = document.getElementById('cacheBadge');

        // ✅ تحقق من الكاش أولاً
        const cached = getMenuCache();
        if (cached) {
            const skelEl = document.getElementById('skeletons');
            if (skelEl) skelEl.style.display = 'none';
            displayProducts(cached.products);
            applyOfferSettings(cached.offerSettings);
            applySocialSettings(cached.socialSettings);
            featuredProducts = (cached.offerSettings.featuredProducts || []).filter(p => p.visible !== false);
            initSlider();
            if (shouldRecordVisit()) recordVisit();
            // ✅ أظهر شارة الكاش
            if (cacheBadge) { cacheBadge.classList.add('show'); setTimeout(() => cacheBadge.classList.remove('show'), 3000); }
            return;
        }

        try {
            // ✅ جلب موازي لتسريع التحميل
            const [productsSnap, settingsSnap] = await Promise.all([
                getDocs(collection(db, "products")),
                getDocs(collection(db, "settings"))
            ]);

            const products = [];
            productsSnap.forEach(d => products.push({ id: d.id, ...d.data() }));

            let offerSettings = { visible: true, badge: '✨ أصنافنا الرمضانية ✨', title: 'طعم السعادة .. على سفرتك ويكمل جمعتك', featuredProducts: [] };
            let socialSettings = { whatsapp: 'https://wa.me/966595711777', instagram: '#', tiktok: 'https://www.tiktok.com/@dmorning.bf', snapchat: 'https://snapchat.com/t/858BelPL' };

            settingsSnap.forEach(d => {
                if (d.id === 'offer')  offerSettings  = { ...offerSettings,  ...d.data() };
                if (d.id === 'social') socialSettings = { ...socialSettings, ...d.data() };
            });

            products.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

            // ✅ حفظ في الكاش
            setMenuCache({ products, offerSettings, socialSettings });

            const skelEl = document.getElementById('skeletons');
            if (skelEl) skelEl.style.display = 'none';

            displayProducts(products);
            applyOfferSettings(offerSettings);
            applySocialSettings(socialSettings);

            featuredProducts = (offerSettings.featuredProducts || []).filter(p => p.visible !== false);
            initSlider();
            if (shouldRecordVisit()) recordVisit();

        } catch (err) {
            console.error(err);
            const skelEl = document.getElementById('skeletons');
            if (skelEl) skelEl.style.display = 'none';
            featuredProducts = [{ name: 'بوكس رمضان دوائر ميني', price: '33.15', image: 'https://l.top4top.io/p_3716sv58p0.png', calories: '580 سعرة', time: '14 دقيقة', desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني' }];
            initSlider();
        }
    }

    async function recordVisit() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const visitRef = doc(db, "analytics", "visits");
            const snap = await getDoc(visitRef);
            const visits = snap.exists() ? snap.data() : {};
            visits[today] = (visits[today] || 0) + 1;
            await setDoc(visitRef, visits);
        } catch(e) {}
    }

    // ═══════════════ SLIDER ═══════════════
    function initSlider() {
        const container = document.getElementById('featured-products-container');
        if (!container) return;
        if (!featuredProducts || featuredProducts.length === 0) {
            featuredProducts = [{ name: 'بوكس رمضان دوائر ميني', price: '33.15', image: 'https://l.top4top.io/p_3716sv58p0.png', calories: '580 سعرة', time: '14 دقيقة', desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني' }];
        }
        container.innerHTML = '';
        const sliderContainer = document.createElement('div'); sliderContainer.className = 'featured-slider-container';
        const wrapper = document.createElement('div'); wrapper.className = 'featured-slider-wrapper'; wrapper.id = 'featuredSliderWrapper';
        const dotsContainer = document.createElement('div'); dotsContainer.className = 'featured-slider-dots'; dotsContainer.style.padding = '0'; dotsContainer.id = 'featuredSliderDots';
        const overflowWrap = document.createElement('div'); overflowWrap.className = 'slider-overflow-wrap'; overflowWrap.style.cssText = 'overflow:hidden; border-radius:16px 16px 0 0;'; overflowWrap.appendChild(wrapper); sliderContainer.appendChild(overflowWrap);
        const bottomNav = document.createElement('div'); bottomNav.className = 'slider-bottom-nav';
        if (featuredProducts.length > 1) {
            const prevBtn = document.createElement('button'); prevBtn.className = 'slider-nav-btn slider-prev'; prevBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
            const nextBtn = document.createElement('button'); nextBtn.className = 'slider-nav-btn slider-next'; nextBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            prevBtn.addEventListener('click', e => { e.stopPropagation(); prevSlide(); });
            nextBtn.addEventListener('click', e => { e.stopPropagation(); nextSlide(); });
            bottomNav.appendChild(prevBtn); bottomNav.appendChild(dotsContainer); bottomNav.appendChild(nextBtn);
        } else { bottomNav.appendChild(dotsContainer); }
        sliderContainer.appendChild(bottomNav); container.appendChild(sliderContainer);
        sliderWrapper = document.getElementById('featuredSliderWrapper');
        const dotsCont = document.getElementById('featuredSliderDots');
        totalSlides = featuredProducts.length; dots = []; currentSlide = 0;
        featuredProducts.forEach((product, index) => {
            const slide = document.createElement('div'); slide.className = 'featured-slide';
            slide.innerHTML = `<div class="featured-card"><div class="featured-card-img-wrap"><img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/200/2b3393/ffffff?text=صورة';"></div><div class="featured-card-body"><div class="featured-card-name">${product.name}</div><div class="featured-card-desc">${product.desc || ''}</div><div class="featured-card-meta">${product.calories && product.calories !== '---' ? `<span><i class="fas fa-fire"></i> ${product.calories}</span>` : ''}${product.time && product.time !== '---' ? `<span><i class="fas fa-clock"></i> ${product.time}</span>` : ''}</div><div class="featured-card-footer"><div class="featured-card-price">${product.price} <span><span class="riyal-symbol">&#xE900;</span></span></div><div class="featured-card-actions"><div class="quantity-control"><button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('featured-${index}', -1)">−</button><span class="qty-value" id="qty-featured-${index}">1</span><button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('featured-${index}', 1)">+</button></div><button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCartFromCard('${index}')"><i class="fas fa-cart-plus"></i><span>أضف للسلة</span></button></div></div></div></div>`;
            wrapper.appendChild(slide);
            if (featuredProducts.length > 1) {
                const dot = document.createElement('span'); dot.className = `featured-dot ${index === 0 ? 'active' : ''}`; dot.addEventListener('click', e => { e.stopPropagation(); goToSlide(index); }); dots.push(dot); dotsCont.appendChild(dot);
            }
        });
        sliderWrapper.addEventListener('mouseenter', stopAutoSlide); sliderWrapper.addEventListener('mouseleave', startAutoSlide);
        let touchStartX = 0;
        sliderWrapper.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; stopAutoSlide(); }, { passive: true });
        sliderWrapper.addEventListener('touchend', e => { const diff = touchStartX - e.changedTouches[0].screenX; if (Math.abs(diff) > 50) { diff > 0 ? prevSlide() : nextSlide(); } startAutoSlide(); }, { passive: true });
        startAutoSlide();
    }

    function goToSlide(index) {
        if (isTransitioning || !sliderWrapper) return;
        index = Math.max(0, Math.min(index, totalSlides - 1));
        isTransitioning = true; currentSlide = index;
        sliderWrapper.style.transform = `translateX(${currentSlide * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
        setTimeout(() => { isTransitioning = false; }, 450);
    }

    function nextSlide() { if (!isTransitioning && totalSlides > 1) goToSlide((currentSlide + 1) % totalSlides); }
    function prevSlide() { if (!isTransitioning && totalSlides > 1) goToSlide((currentSlide - 1 + totalSlides) % totalSlides); }
    function startAutoSlide() { if (autoSlideInterval) clearInterval(autoSlideInterval); if (totalSlides > 1) autoSlideInterval = setInterval(() => { if (!isTransitioning) nextSlide(); }, 5000); }
    function stopAutoSlide() { if (autoSlideInterval) { clearInterval(autoSlideInterval); autoSlideInterval = null; } }

    window.adjustQuantity = function(productId, change) { const el = document.getElementById(`qty-${productId}`); if (el) el.textContent = Math.max(1, parseInt(el.textContent) + change); };

    // ✅ عرض المنتجات بـ DocumentFragment (أسرع)
    function displayProducts(products) {
        const categorized = {};
        products.forEach(product => { if (product.status === 'active') { if (!categorized[product.category]) categorized[product.category] = []; categorized[product.category].push(product); } });
        Object.keys(categorized).forEach(cat => {
            const list = document.getElementById(`${cat}-list`); const section = document.getElementById(`section-${cat}`);
            if (section) section.style.display = 'block'; if (!list) return;
            const frag = document.createDocumentFragment();
            categorized[cat].forEach(product => {
                const productId = `product-${product.id}`; const row = document.createElement('div'); row.className = 'product-row';
                const safeProduct = JSON.stringify(product).replace(/"/g, '&quot;');
                row.innerHTML = `<div class="product-left" onclick="openModal(${safeProduct})"><div class="product-img-wrap"><img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/75/2b3393/ffffff?text=img';"></div><div class="product-info"><span class="product-name">${product.name}</span>${product.desc ? `<span class="product-desc-sm">${product.desc.substring(0,50)}${product.desc.length > 50 ? '...' : ''}</span>` : ''}<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">${product.calories && product.calories !== '---' ? `<span class="product-meta-sm"><i class="fas fa-fire"></i> ${product.calories}</span>` : ''}${product.time && product.time !== '---' ? `<span class="product-meta-sm"><i class="fas fa-clock"></i> ${product.time}</span>` : ''}</div></div></div><div class="product-right"><div class="product-price">${product.price} <small><span class="riyal-symbol">&#xE900;</span></small></div><div class="product-actions"><div class="quantity-control"><button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('${productId}', -1)">−</button><span class="qty-value" id="qty-${productId}">1</span><button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('${productId}', 1)">+</button></div><button class="add-to-cart-small" onclick="addToCartFromRow(${safeProduct}, '${productId}')"><i class="fas fa-cart-plus"></i></button></div></div>`;
                frag.appendChild(row);
            });
            list.appendChild(frag);
        });
        document.querySelectorAll('.cat-btn[data-section]').forEach(btn => {
            const sec = btn.getAttribute('data-section');
            if (sec === 'offer-section') return;
            btn.style.display = categorized[sec] ? '' : 'none';
        });
        setupScrollObserver();
    }

    function setupScrollObserver() {
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if (entry.isIntersecting) { const id = entry.target.id; document.querySelectorAll('.cat-btn').forEach(btn => { btn.classList.toggle('active', btn.getAttribute('data-section') === id || (id === 'offer-section' && btn.getAttribute('data-section') === 'offer-section')); }); } });
        }, { threshold: 0.2, rootMargin: '-120px 0px -50% 0px' });
        document.querySelectorAll('.scroll-margin').forEach(el => observer.observe(el));
    }

    window.addToCartFromRow = function(product, quantityId) { const el = document.getElementById(`qty-${quantityId}`); const quantity = el ? parseInt(el.textContent) : 1; addToCart({ id: product.id, name: product.name, price: product.price, image: product.image }, quantity); if (el) el.textContent = '1'; };
    window.addToCartFromCard = function(index) { const product = featuredProducts[index]; if (!product) return; const el = document.getElementById(`qty-featured-${index}`); const quantity = el ? parseInt(el.textContent) : 1; addToCart({ id: `featured-${index}`, name: product.name, price: product.price, image: product.image }, quantity); if (el) el.textContent = '1'; };

    window.openModal = function(product) {
        const modal = document.getElementById('productModal');
        document.getElementById('modalImg').src = product.image || '';
        document.getElementById('modalName').innerText = product.name || '';
        document.getElementById('modalDesc').innerText = product.desc || 'وصف المنتج';
        document.getElementById('modalPrice').innerHTML = (product.price || '0') + ' <span class="riyal-symbol">&#xE900;</span>';
        document.getElementById('modalCalories').innerText = product.calories || '---';
        document.getElementById('modalTime').innerText = product.time || '---';
        const modalQtyEl = document.getElementById('modalQty'); if (modalQtyEl) modalQtyEl.textContent = '1';
        window._modalProduct = product;
        if (modal) { modal.classList.add('active'); document.body.style.overflow = 'hidden'; }
    };

    window.adjustModalQty = function(change) { const el = document.getElementById('modalQty'); if (el) el.textContent = Math.max(1, parseInt(el.textContent) + change); };
    window.addModalToCart = function() { if (!window._modalProduct) return; const qty = parseInt(document.getElementById('modalQty').textContent) || 1; addToCart({ id: window._modalProduct.id, name: window._modalProduct.name, price: window._modalProduct.price, image: window._modalProduct.image }, qty); window.closeModal({ target: { classList: { contains: () => true } } }); };
    window.closeModal = function(event) { const modal = document.getElementById('productModal'); if (event.target.classList.contains('modal-overlay') || (event.target.closest && event.target.closest('.modal-close'))) { modal.classList.remove('active'); document.body.style.overflow = ''; } };
    window.goTo = function(sectionId, btn) { const element = document.getElementById(sectionId); if (element) { element.scrollIntoView({ behavior: 'smooth', block: 'start' }); document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); if (btn) btn.classList.add('active'); } };

    window.addEventListener('DOMContentLoaded', loadProducts);
</script>

<script>
    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function toggleDeliveryNote(radio) { const note = document.getElementById('deliveryNote'); if (note) note.style.display = radio.value === 'توصيل' ? 'block' : 'none'; }
    document.addEventListener('DOMContentLoaded', () => { const note = document.getElementById('deliveryNote'); if (note) note.style.display = 'block'; });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            const sidebar = document.getElementById('cartSidebar'); const overlay = document.getElementById('overlay');
            if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); overlay.classList.remove('active'); }
            const modal = document.getElementById('productModal');
            if (modal && modal.classList.contains('active')) { modal.classList.remove('active'); document.body.style.overflow = ''; }
        }
    });
</script>

</body>
