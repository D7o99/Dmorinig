<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dmorning | قائمة الطعام</title>

    <!-- الصورة المصغرة للموقع -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg">
    <link rel="shortcut icon" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg">

    <!-- تحميل الخطوط بشكل متقدم -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- تحميل Font Awesome بشكل محسن -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></noscript>
    
    <script type="module">
        // ================== استيراد Firebase مع تحسين الأداء ==================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARoaXISEB8yiCmes_EmZLhb-8ZtbwOR-k",
            authDomain: "dmorinig-f29d9.firebaseapp.com",
            projectId: "dmorinig-f29d9",
            storageBucket: "dmorinig-f29d9.firebasestorage.app",
            messagingSenderId: "813644062004",
            appId: "1:813644062004:web:e822278f6ee5f2f6f05961",
            measurementId: "G-77LJ79TDS2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ================== متغيرات السلايدر المحسنة ==================
        let currentSlide = 0;
        let totalSlides = 0;
        let autoSlideInterval;
        let isTransitioning = false;
        let sliderWrapper = null;
        let dots = [];
        let featuredProducts = [];

        // ================== مؤشر التحميل المتحسن ==================
        function showLoading() {
            const sections = ['sandwich-list', 'circles-list', 'hummus-list', 'drinks-list', 'boxes-list', 'sauces-list'];
            sections.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنتجات...</div>';
                }
            });
        }

        // ================== تحميل المنتجات مع تحسين الأداء ==================
        async function loadProducts() {
            showLoading();
            
            try {
                // استخدام Promise.all مع تحسين الأداء
                const [productsSnapshot, settingsSnapshot] = await Promise.all([
                    getDocs(collection(db, "products")),
                    getDocs(collection(db, "settings"))
                ]);
                
                const products = [];
                productsSnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });

                // تحميل إعدادات العروض
                let offerSettings = { 
                    visible: true,
                    badge: '✨ أصنافنا الرمضانية ✨',
                    title: 'طعم السعادة .. على سفرتك ويكمل جمعتك',
                    featuredProducts: [
                        {
                            name: 'بوكس رمضان دوائر ميني',
                            price: '33.15',
                            image: 'https://l.top4top.io/p_3716sv58p0.png',
                            calories: '580 سعرة',
                            time: '14 دقيقة',
                            desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني',
                            whatsapp: '966595711777'
                        }
                    ]
                };
                
                settingsSnapshot.forEach((doc) => {
                    if (doc.id === 'offer') {
                        offerSettings = { ...offerSettings, ...doc.data() };
                    }
                });

                // ترتيب المنتجات من الأحدث
                products.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                
                // عرض المنتجات في الأقسام
                displayProducts(products);
                
                // عرض أو إخفاء قسم العروض حسب الإعدادات
                const offerSection = document.getElementById('offer-section');
                if (offerSection) {
                    offerSection.style.display = offerSettings.visible ? 'block' : 'none';
                }

                // تحديث عنوان العروض
                const badgeEl = document.getElementById('offerBadge');
                const titleEl = document.getElementById('offerTitle');
                if (badgeEl) badgeEl.textContent = offerSettings.badge || '✨ عروضنا المميزة ✨';
                if (titleEl) titleEl.textContent = offerSettings.title || 'أفضل العروض لفترة محدودة';

                // حفظ المنتجات الرئيسية
                featuredProducts = offerSettings.featuredProducts || [];
                
                // عرض المنتجات الرئيسية في السلايدر
                initSlider();
                
            } catch (error) {
                console.error("خطأ في تحميل المنتجات:", error);
                showError();
            }
        }

        // ================== تهيئة السلايدر المحسنة ==================
        function initSlider() {
            const container = document.getElementById('featured-products-container');
            if (!container) return;
            
            // التأكد من وجود منتجات
            if (!featuredProducts || featuredProducts.length === 0) {
                featuredProducts = [{
                    name: 'بوكس رمضان دوائر ميني',
                    price: '33.15',
                    image: 'https://l.top4top.io/p_3716sv58p0.png',
                    calories: '580 سعرة',
                    time: '14 دقيقة',
                    desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني',
                    whatsapp: '966595711777'
                }];
            }
            
            // إنشاء هيكل السلايدر مع تحسين RTL
            container.innerHTML = `
                <div class="featured-slider-container">
                    <div class="featured-slider-wrapper" id="featuredSliderWrapper" style="transform: translateX(0);"></div>
                    
                    <div class="featured-slider-controls">
                        <button class="featured-slider-btn" id="featuredPrevBtn" aria-label="السابق">❮</button>
                        <button class="featured-slider-btn" id="featuredNextBtn" aria-label="التالي">❯</button>
                    </div>
                    
                    <div class="featured-slider-dots" id="featuredSliderDots"></div>
                </div>
            `;
            
            sliderWrapper = document.getElementById('featuredSliderWrapper');
            const dotsContainer = document.getElementById('featuredSliderDots');
            const prevBtn = document.getElementById('featuredPrevBtn');
            const nextBtn = document.getElementById('featuredNextBtn');
            
            if (!sliderWrapper) return;
            
            totalSlides = featuredProducts.length;
            dots = [];
            
            // تحسين أداء العرض باستخدام DocumentFragment
            const fragment = document.createDocumentFragment();
            const dotsFragment = document.createDocumentFragment();
            
            featuredProducts.forEach((product, index) => {
                const slide = document.createElement('div');
                slide.className = 'featured-slide';
                
                // تحسين عرض الصورة باستخدام loading="lazy"
                slide.innerHTML = `
                    <div class="product-card" data-product-index="${index}">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/200/2b3393/ffffff?text=صورة';">
                        </div>
                        <div class="product-info">
                            <div class="product-title">${product.name}</div>
                            <div class="product-desc">${product.desc || ''}</div>
                            <div class="price">${product.price} ريال</div>
                            <a class="order-btn" href="https://wa.me/${product.whatsapp || '966595711777'}" target="_blank" onclick="event.stopPropagation();"> اطلب عبر الواتساب</a>
                        </div>
                    </div>
                `;
                
                // إضافة حدث النقر بعد الإنشاء لتحسين الأداء
                const card = slide.querySelector('.product-card');
                card.addEventListener('click', () => openModal(product));
                
                fragment.appendChild(slide);
                
                // إضافة نقاط المؤشر
                const dot = document.createElement('span');
                dot.className = `featured-dot ${index === 0 ? 'active' : ''}`;
                dot.setAttribute('data-index', index);
                dot.addEventListener('click', () => goToSlide(index));
                dots.push(dot);
                dotsFragment.appendChild(dot);
            });
            
            sliderWrapper.appendChild(fragment);
            dotsContainer.appendChild(dotsFragment);
            
            // إضافة مستمعي الأحداث للأزرار مع debounce لمنع التكرار
            if (prevBtn) {
                prevBtn.addEventListener('click', debounce(prevSlide, 300));
            }
            if (nextBtn) {
                nextBtn.addEventListener('click', debounce(nextSlide, 300));
            }
            
            // بدء التشغيل التلقائي
            startAutoSlide();
            
            // إيقاف التشغيل التلقائي عند التحويم
            sliderWrapper.addEventListener('mouseenter', stopAutoSlide);
            sliderWrapper.addEventListener('mouseleave', startAutoSlide);
            
            // دعم اللمس للجوال مع تحسين RTL
            let touchStartX = 0;
            let touchEndX = 0;
            
            sliderWrapper.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                stopAutoSlide();
            }, { passive: true });
            
            sliderWrapper.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                
                // في وضع RTL، الاتجاه معكوس
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        // سحب لليسار = التالي
                        nextSlide();
                    } else {
                        // سحب لليمين = السابق
                        prevSlide();
                    }
                }
                startAutoSlide();
            }, { passive: true });
        }

        // ================== دوال السلايدر المحسنة ==================
        function goToSlide(index) {
            if (isTransitioning || !sliderWrapper) return;
            
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            
            isTransitioning = true;
            currentSlide = index;
            
            // تحريك السلايدر مع مراعاة RTL
            sliderWrapper.style.transform = `translateX(${currentSlide * 100}%)`;
            
            // تحديث النقاط
            dots.forEach((dot, i) => {
                if (i === currentSlide) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
            
            // إلغاء علامة الانتقال بعد انتهاء الحركة
            setTimeout(() => {
                isTransitioning = false;
            }, 500);
        }

        function nextSlide() {
            if (isTransitioning || totalSlides <= 1) return;
            currentSlide = (currentSlide + 1) % totalSlides;
            goToSlide(currentSlide);
        }

        function prevSlide() {
            if (isTransitioning || totalSlides <= 1) return;
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            goToSlide(currentSlide);
        }

        function startAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            if (totalSlides > 1) {
                autoSlideInterval = setInterval(() => {
                    if (!isTransitioning) {
                        nextSlide();
                    }
                }, 5000);
            }
        }

        function stopAutoSlide() {
            if (autoSlideInterval) {
                clearInterval(autoSlideInterval);
                autoSlideInterval = null;
            }
        }

        // ================== دالة debounce لمنع التكرار ==================
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // ================== عرض رسالة خطأ ==================
        function showError() {
            const sections = ['sandwich-list', 'circles-list', 'hummus-list', 'drinks-list', 'boxes-list', 'sauces-list'];
            sections.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل المنتجات</div>';
                }
            });
        }

        // ================== عرض المنتجات ==================
        function displayProducts(products) {
            // تعريف الأقسام
            const sections = {
                sauces: document.getElementById('sauces-list'),
                sandwich: document.getElementById('sandwich-list'),
                circles: document.getElementById('circles-list'),
                hummus: document.getElementById('hummus-list'),
                drinks: document.getElementById('drinks-list'),
                boxes: document.getElementById('boxes-list')
            };

            // مسح المحتوى القديم
            for (let key in sections) {
                if (sections[key]) {
                    sections[key].innerHTML = '';
                }
            }

            // إضافة المنتجات لكل قسم
            products.forEach(product => {
                const section = sections[product.category];
                if (section && product.status === 'active') {
                    const productRow = document.createElement('div');
                    productRow.className = 'product-row';
                    
                    productRow.addEventListener('click', function() {
                        openModal(product);
                    });
                    
                    productRow.innerHTML = `
                        <div class="product-left">
                            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/75/2b3393/ffffff?text=img';">
                            <span class="product-name">${product.name}</span>
                        </div>
                        <div class="product-price">${product.price} ريال</div>
                    `;
                    
                    section.appendChild(productRow);
                }
            });

            // إظهار رسالة إذا كان القسم فارغاً
            for (let key in sections) {
                if (sections[key] && sections[key].children.length === 0) {
                    sections[key].innerHTML = '<div class="empty-message">لا توجد منتجات في هذا القسم</div>';
                }
            }
        }

        // تحميل المنتجات عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', loadProducts);
        
        // ================== دالة فتح المودال ==================
        window.openModal = function(product) {
            const modal = document.getElementById('productModal');
            const modalImg = document.getElementById('modalImg');
            const modalName = document.getElementById('modalName');
            const modalDesc = document.getElementById('modalDesc');
            const modalPrice = document.getElementById('modalPrice');
            const modalCalories = document.getElementById('modalCalories');
            const modalTime = document.getElementById('modalTime');
            const modalWhatsapp = document.getElementById('modalWhatsapp');
            
            if (modalImg) modalImg.src = product.image || 'https://via.placeholder.com/300';
            if (modalName) modalName.innerText = product.name || 'منتج';
            if (modalDesc) modalDesc.innerText = product.desc || 'وصف المنتج';
            if (modalPrice) modalPrice.innerText = (product.price || '0') + ' ريال';
            if (modalCalories) modalCalories.innerText = product.calories || '---';
            if (modalTime) modalTime.innerText = product.time || '---';
            
            let message = encodeURIComponent(`مرحباً، أريد طلب ${product.name} - السعر: ${product.price} ريال`);
            if (modalWhatsapp) modalWhatsapp.href = `https://wa.me/${product.whatsapp || '966595711777'}?text=${message}`;
            
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        // دالة إغلاق المودال
        window.closeModal = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target.classList.contains('modal-overlay') || event.target.closest('.modal-close')) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        };

        // إغلاق المودال بزر ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('productModal');
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // دالة التمرير للأقسام
        window.goTo = function(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                document.querySelectorAll('.categories button').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            }
        };

        // التمرير إلى العروض عند تحميل الصفحة
        window.addEventListener('load', function() {
            setTimeout(() => {
                const offerElement = document.getElementById('offer-section');
                if (offerElement) {
                    offerElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 100);
        });
    </script>

    <style>

            --light-bg: #f5f6fc;
            --shadow-sm: 0 10px 25px rgba(0,0,0,0.08);
            --shadow-hover: 0 20px 35px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--light-bg);
            scroll-behavior: smooth;
        }

        /* مؤشر التحميل */

        .section-heading {

        }

        .scroll-margin {

        }

        /* قائمة المنتجات */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .product-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;

            box-shadow: none;
            transition: background 0.3s ease;

        .product-row:hover {

        }

        .product-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-left img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: transparent;
            object-fit: cover;
            padding: 3px;
            border: none;

        .product-row:hover .product-left img {

        .product-name {
