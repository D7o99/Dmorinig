<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دوائر | قائمة الطعام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script type="module">
        // ================== استيراد Firebase ==================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARoaXISEB8yiCmes_EmZLhb-8ZtbwOR-k",
            authDomain: "dmorinig-f29d9.firebaseapp.com",
            projectId: "dmorinig-f29d9",
            storageBucket: "dmorinig-f29d9.firebasestorage.app",
            messagingSenderId: "813644062004",
            appId: "1:813644062004:web:e822278f6ee5f2f6f05961",
            measurementId: "G-77LJ79TDS2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ================== مؤشر التحميل ==================
        function showLoading() {
            const sections = ['sandwich-list', 'circles-list', 'hummus-list', 'drinks-list', 'boxes-list', 'sauces-list'];
            sections.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنتجات...</div>';
                }
            });
        }

        // ================== تحميل المنتجات ==================
        async function loadProducts() {
            showLoading();
            
            try {
                const [productsSnapshot, settingsSnapshot] = await Promise.all([
                    getDocs(collection(db, "products")),
                    getDocs(collection(db, "settings"))
                ]);
                
                const products = [];
                productsSnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });

                // تحميل إعدادات العروض
                let offerSettings = { 
                    visible: true,
                    badge: '✨ أصنافنا الرمضانية ✨',
                    title: 'طعم السعادة .. على سفرتك ويكمل جمعتك',
                    featuredProducts: [
                        {
                            name: 'بوكس رمضان دوائر ميني',
                            price: '33.15',
                            image: 'https://l.top4top.io/p_3716sv58p0.png',
                            calories: '580 سعرة',
                            time: '14 دقيقة',
                            desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني',
                            whatsapp: '966595711777'
                        }
                    ]
                };
                
                settingsSnapshot.forEach((doc) => {
                    if (doc.id === 'offer') {
                        offerSettings = { ...offerSettings, ...doc.data() };
                    }
                });

                // ترتيب المنتجات من الأحدث
                products.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                
                // عرض المنتجات في الأقسام
                displayProducts(products);
                
                // عرض أو إخفاء قسم العروض حسب الإعدادات
                const offerSection = document.getElementById('offer-section');
                if (offerSection) {
                    offerSection.style.display = offerSettings.visible ? 'block' : 'none';
                }

                // تحديث عنوان العروض
                const badgeEl = document.getElementById('offerBadge');
                const titleEl = document.getElementById('offerTitle');
                if (badgeEl) badgeEl.textContent = offerSettings.badge || '✨ عروضنا المميزة ✨';
                if (titleEl) titleEl.textContent = offerSettings.title || 'أفضل العروض لفترة محدودة';

                // عرض المنتجات الرئيسية
                displayFeaturedProducts(offerSettings.featuredProducts || []);
                
            } catch (error) {
                console.error("خطأ في تحميل المنتجات:", error);
                showError();
            }
        }

        // ================== عرض المنتجات الرئيسية (العروض) ==================
        function displayFeaturedProducts(featuredProducts) {
            const container = document.getElementById('featured-products-container');
            if (!container) return;
            
            container.innerHTML = '';
            
            if (!featuredProducts || featuredProducts.length === 0) {
                // عرض منتج افتراضي إذا لم تكن هناك عروض
                const defaultProduct = {
                    name: 'بوكس رمضان دوائر ميني',
                    price: '33.15',
                    image: 'https://l.top4top.io/p_3716sv58p0.png',
                    calories: '580 سعرة',
                    time: '14 دقيقة',
                    desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني',
                    whatsapp: '966595711777'
                };
                featuredProducts = [defaultProduct];
            }
            
            featuredProducts.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.onclick = () => openModal(product);
                
                productCard.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/200/2b3393/ffffff?text=صورة';">
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-desc">${product.desc || ''}</div>
                        <div class="price">${product.price} ريال</div>
                        <a class="order-btn" href="https://wa.me/${product.whatsapp || '966595711777'}" target="_blank" onclick="event.stopPropagation();"> اطلب عبر الواتساب</a>
                    </div>
                `;
                
                container.appendChild(productCard);
            });
        }

        // ================== عرض رسالة خطأ ==================
        function showError() {
            const sections = ['sandwich-list', 'circles-list', 'hummus-list', 'drinks-list', 'boxes-list', 'sauces-list'];
            sections.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل المنتجات</div>';
                }
            });
        }

        // ================== عرض المنتجات ==================
        function displayProducts(products) {
            // تعريف الأقسام
            const sections = {
                sauces: document.getElementById('sauces-list'),
                sandwich: document.getElementById('sandwich-list'),
                circles: document.getElementById('circles-list'),
                hummus: document.getElementById('hummus-list'),
                drinks: document.getElementById('drinks-list'),
                boxes: document.getElementById('boxes-list')
            };

            // مسح المحتوى القديم
            for (let key in sections) {
                if (sections[key]) {
                    sections[key].innerHTML = '';
                }
            }

            // إضافة المنتجات لكل قسم
            products.forEach(product => {
                const section = sections[product.category];
                if (section && product.status === 'active') { // فقط المنتجات الظاهرة
                    const productRow = document.createElement('div');
                    productRow.className = 'product-row';
                    
                    productRow.addEventListener('click', function() {
                        openModal(product);
                    });
                    
                    productRow.innerHTML = `
                        <div class="product-left">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/75/2b3393/ffffff?text=img';">
                            <span class="product-name">${product.name}</span>
                        </div>
                        <div class="product-price">${product.price} ريال</div>
                    `;
                    
                    section.appendChild(productRow);
                }
            });

            // إظهار رسالة إذا كان القسم فارغاً
            for (let key in sections) {
                if (sections[key] && sections[key].children.length === 0) {
                    sections[key].innerHTML = '<div class="empty-message">لا توجد منتجات في هذا القسم</div>';
                }
            }
        }

        // تحميل المنتجات عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', loadProducts);
        
        // ================== دالة فتح المودال ==================
        window.openModal = function(product) {
            console.log('فتح المودال:', product);
            
            const modal = document.getElementById('productModal');
            const modalImg = document.getElementById('modalImg');
            const modalName = document.getElementById('modalName');
            const modalDesc = document.getElementById('modalDesc');
            const modalPrice = document.getElementById('modalPrice');
            const modalCalories = document.getElementById('modalCalories');
            const modalTime = document.getElementById('modalTime');
            const modalWhatsapp = document.getElementById('modalWhatsapp');
            
            if (modalImg) modalImg.src = product.image || 'https://via.placeholder.com/300';
            if (modalName) modalName.innerText = product.name || 'منتج';
            if (modalDesc) modalDesc.innerText = product.desc || 'وصف المنتج';
            if (modalPrice) modalPrice.innerText = (product.price || '0') + ' ريال';
            if (modalCalories) modalCalories.innerText = product.calories || '---';
            if (modalTime) modalTime.innerText = product.time || '---';
            
            let message = encodeURIComponent(`مرحباً، أريد طلب ${product.name} - السعر: ${product.price} ريال`);
            if (modalWhatsapp) modalWhatsapp.href = `https://wa.me/${product.whatsapp || '966595711777'}?text=${message}`;
            
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        // دالة إغلاق المودال
        window.closeModal = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target.classList.contains('modal-overlay') || event.target.closest('.modal-close')) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        };

        // إغلاق المودال بزر ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('productModal');
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // دالة التمرير للأقسام
        window.goTo = function(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                // تحديث الزر النشط
                document.querySelectorAll('.categories button').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            }
        };

        // التمرير إلى العروض عند تحميل الصفحة
        window.addEventListener('load', function() {
            setTimeout(() => {
                const offerElement = document.getElementById('offer-section');
                if (offerElement) {
                    offerElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 100);
        });
    </script>

    <style>
        :root {
            --main: #2b3393;
            --secondary: #f8c81c;
            --light-bg: #f5f6fc;
            --shadow-sm: 0 10px 25px rgba(0,0,0,0.08);
            --shadow-hover: 0 20px 35px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--light-bg);
            scroll-behavior: smooth;
        }

        /* مؤشر التحميل */
        .loading-spinner {
            text-align: center;
            padding: 30px;
            color: var(--main);
            font-size: 1.1rem;
        }

        .loading-spinner i {
            margin-left: 10px;
            font-size: 1.3rem;
        }

        .error-message {
            text-align: center;
            padding: 30px;
            color: #d33;
            font-size: 1.1rem;
        }

        .empty-message {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.95rem;
        }

        /* الهيدر الثابت */
        .sticky-header {
            position: sticky;
            top: 0;
            background: #2b3393;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 1000;
            padding: 0;
            border-bottom: 3px solid var(--secondary);
        }

        .logo-container {
            text-align: center;
            padding: 5px 0;
        }

        .logo-container img {
            max-height: 50px;
            width: auto;
            display: inline-block;
        }

        /* أزرار التصنيفات */
        .categories {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 5px 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--secondary) #fff;
            justify-content: flex-start;
            background: #2b3393;
        }

        .categories button {
            border: none;
            background: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-size: 13px;
            color: var(--main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .categories button.active {
            background: var(--secondary);
            color: var(--main);
            box-shadow: 0 4px 10px rgba(248, 200, 28, 0.4);
        }

        .categories button:hover {
            background: #dde0ff;
            transform: translateY(-2px);
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 15px;
        }

        /* العنوان الرئيسي */
        .header {
            text-align: center;
            margin: 20px 0;
        }

        .badge {
            color: var(--main);
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            color: var(--main);
        }

        .line {
            width: 60px;
            height: 3px;
            background: var(--secondary);
            margin: 10px auto;
            border-radius: 5px;
        }

        /* بطاقة المنتج الرئيسي */
        .product-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
            cursor: pointer;
        }

        .product-image {
            background: linear-gradient(145deg, #eef0ff, #ffffff);
            padding: 20px;
            text-align: center;
        }

        .product-image img {
            width: 180px;
            max-width: 100%;
            border-radius: 15px;
            padding: 5px;
        }

        .product-info {
            padding: 15px;
            text-align: center;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--main);
        }

        .product-desc {
            margin-top: 8px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .price {
            color: var(--main);
            font-weight: 700;
            margin-top: 10px;
            font-size: 1.2rem;
        }

        .order-btn {
            margin-top: 15px;
            display: inline-block;
            background: var(--main);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .order-btn::before {
            content: "\f232";
            font-family: "Font Awesome 6 Brands";
            margin-left: 8px;
        }

        /* عناوين الأقسام */
        .section-heading {
            font-size: 22px;
            color: var(--main);
            margin: 25px 0 15px;
            padding-right: 10px;
            border-right: 4px solid var(--secondary);
        }

        .scroll-margin {
            scroll-margin-top: 110px;
        }

        /* قائمة المنتجات - بدون border للصور */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .product-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 8px 10px;
            border-radius: 0;
            box-shadow: none;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .product-row:hover {
            background: #f8f9fa;
        }

        .product-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-left img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: transparent;
            object-fit: cover;
            padding: 3px;
            border: none; /* إزالة border */
            transition: var(--transition);
        }

        .product-row:hover .product-left img {
            transform: scale(1.02);
        }

        .product-name {
            font-weight: 500;
            color: var(--main);
            font-size: 14px;
        }

        .product-price {
            color: var(--main);
            font-weight: 700;
            font-size: 14px;
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        /* المودال - بدون border للصور */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 25px;
            overflow: hidden;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--main);
            z-index: 10;
            border: none;
        }

        .modal-close:hover {
            background: var(--secondary);
            transform: rotate(90deg);
        }

        .modal-image {
            background: #eef0ff;
            padding: 20px;
            text-align: center;
        }

        .modal-image img {
            width: 150px;
            max-width: 100%;
            border-radius: 15px;
            padding: 5px;
            border: none; /* إزالة border */
        }

        .modal-details {
            padding: 20px;
            text-align: center;
        }

        .modal-details h2 {
            color: var(--main);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-description {
            color: #666;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .modal-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--main);
            margin: 10px 0;
        }

        .modal-whatsapp {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        .modal-whatsapp:hover {
            background: #128C7E;
        }

        .modal-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
            color: #555;
            font-size: 0.9rem;
        }

        .modal-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .modal-meta i {
            color: var(--secondary);
        }

        /* التواصل الاجتماعي */
        .social-section {
            background: white;
            border-radius: 30px;
            padding: 25px 15px;
            margin: 30px 0 20px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .social-title {
            color: var(--main);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #f0f2ff;
            color: var(--main);
            font-size: 1.5rem;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-icon:hover {
            transform: translateY(-5px);
        }

        .social-icon:nth-child(1):hover { background: #25D366; color: white; }
        .social-icon:nth-child(2):hover { background: #E4405F; color: white; }
        .social-icon:nth-child(3):hover { background: #000000; color: white; }
        .social-icon:nth-child(4):hover { background: #FFFC00; color: #000; }

        /* خريطة */
        .map-container {
            margin: 20px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .map-container iframe {
            width: 100%;
            height: 250px;
            border: 0;
        }

        /* تحسينات الجوال */
        @media (max-width: 480px) {
            .product-left img {
                width: 55px;
                height: 55px;
            }
            
            .product-name {
                font-size: 13px;
            }
            
            .product-price {
                font-size: 13px;
            }
            
            .categories button {
                padding: 6px 14px;
                font-size: 12px;
            }
            
            .section-heading {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- الهيدر الثابت -->
    <div class="sticky-header">
        <div class="logo-container">
            <img src="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg" alt="لوجو" onerror="this.src='https://via.placeholder.com/150x50/2b3393/ffffff?text=Logo';">
        </div>
        <div class="categories">
            <button onclick="goTo('offer-section')" class="active">العروض</button>
            <button onclick="goTo('sandwich')">الساندويتش</button>
            <button onclick="goTo('circles')">الدوائر</button>
            <button onclick="goTo('hummus')">الحمسات</button>
            <button onclick="goTo('drinks')">المشروبات</button>
            <button onclick="goTo('boxes')">البوكسات</button>
            <button onclick="goTo('sauces')">الصوصات</button>
        </div>
    </div>

    <div class="container">
        <!-- قسم العروض (ديناميكي) -->
        <div id="offer-section" class="scroll-margin">
