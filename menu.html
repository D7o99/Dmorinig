<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dmorning | قائمة الطعام</title>

    <!-- الصورة المصغرة للموقع -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg">
    <link rel="shortcut icon" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg" type="image/x-icon">
    <link rel="apple-touch-icon" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg">

    <!-- تحميل الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script type="module">
        // ================== استيراد Firebase ==================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARoaXISEB8yiCmes_EmZLhb-8ZtbwOR-k",
            authDomain: "dmorinig-f29d9.firebaseapp.com",
            projectId: "dmorinig-f29d9",
            storageBucket: "dmorinig-f29d9.firebasestorage.app",
            messagingSenderId: "813644062004",
            appId: "1:813644062004:web:e822278f6ee5f2f6f05961",
            measurementId: "G-77LJ79TDS2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ================== متغيرات السلة ==================
        let cart = [];
        const whatsappNumber = "966595711777";

        // ================== متغيرات السلايدر ==================
        let currentSlide = 0;
        let totalSlides = 0;
        let autoSlideInterval;
        let isTransitioning = false;
        let sliderWrapper = null;
        let dots = [];
        let featuredProducts = [];

        // ================== دوال السلة ==================
        function addToCart(product, quantity = 1) {
            const existingItem = cart.find(item => item.id === product.id);
            
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: quantity,
                    image: product.image
                });
            }
            
            updateCartDisplay();
            showNotification(`تمت إضافة ${product.name} إلى السلة`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartDisplay();
        }

        function updateQuantity(productId, newQuantity) {
            if (newQuantity <= 0) {
                removeFromCart(productId);
                return;
            }
            
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity = newQuantity;
                updateCartDisplay();
            }
        }

        function updateCartDisplay() {
            const cartItems = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');
            const emptyCart = document.getElementById('empty-cart');
            const cartContent = document.getElementById('cart-content');
            
            // تحديث عداد السلة
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (cartCount) {
                cartCount.textContent = totalItems;
                cartCount.style.display = totalItems > 0 ? 'flex' : 'none';
            }
            
            // عرض محتوى السلة
            if (cartItems) {
                if (cart.length === 0) {
                    if (emptyCart) emptyCart.style.display = 'block';
                    if (cartContent) cartContent.style.display = 'none';
                } else {
                    if (emptyCart) emptyCart.style.display = 'none';
                    if (cartContent) cartContent.style.display = 'block';
                    
                    cartItems.innerHTML = cart.map(item => `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/50/2b3393/ffffff?text=img';">
                            <div class="cart-item-details">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">${item.price} ريال</div>
                            </div>
                            <div class="cart-item-quantity">
                                <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity - 1})">−</button>
                                <span class="cart-qty-value">${item.quantity}</span>
                                <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
                            </div>
                            <button class="cart-item-remove" onclick="removeFromCart('${item.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `).join('');
                    
                    // حساب المجموع
                    const total = cart.reduce((sum, item) => sum + (parseFloat(item.price) * item.quantity), 0);
                    if (cartTotal) cartTotal.textContent = total.toFixed(2);
                }
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ================== إرسال الطلب عبر الواتساب ==================
        window.sendOrderViaWhatsApp = function() {
            if (cart.length === 0) {
                showNotification('السلة فارغة! أضف منتجات أولاً');
                return;
            }

            // الحصول على طريقة التوصيل
            const deliveryMethod = document.querySelector('input[name="delivery"]:checked')?.value || 'استلام';
            
            // تكوين رسالة الطلب (فقط اسم المنتج والكمية)
            let orderDetails = '📋 *تفاصيل الطلب:*\n\n';
            
            cart.forEach(item => {
                orderDetails += `• ${item.name} (${item.quantity})\n`;
            });
            
            orderDetails += `\n📦 *طريقة الاستلام:* ${deliveryMethod}`;
            
            // ترميز الرسالة وإرسالها
            const encodedMessage = encodeURIComponent(orderDetails);
            window.open(`https://wa.me/${whatsappNumber}?text=${encodedMessage}`, '_blank');
        };

        // ================== تحميل المنتجات ==================
        async function loadProducts() {
            try {
                // استخدام Promise.all مع تحسين الأداء
                const [productsSnapshot, settingsSnapshot] = await Promise.all([
                    getDocs(collection(db, "products")),
                    getDocs(collection(db, "settings"))
                ]);
                
                const products = [];
                productsSnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });

                // تحميل إعدادات العروض
                let offerSettings = { 
                    visible: true,
                    badge: '✨ أصنافنا الرمضانية ✨',
                    title: 'طعم السعادة .. على سفرتك ويكمل جمعتك',
                    featuredProducts: [
                        {
                            name: 'بوكس رمضان دوائر ميني',
                            price: '33.15',
                            image: 'https://l.top4top.io/p_3716sv58p0.png',
                            calories: '580 سعرة',
                            time: '14 دقيقة',
                            desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني',
                            whatsapp: '966595711777'
                        }
                    ]
                };
                
                settingsSnapshot.forEach((doc) => {
                    if (doc.id === 'offer') {
                        offerSettings = { ...offerSettings, ...doc.data() };
                    }
                });

                // ترتيب المنتجات من الأحدث
                products.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                
                // عرض المنتجات في الأقسام
                displayProducts(products);
                
                // عرض أو إخفاء قسم العروض حسب الإعدادات
                const offerSection = document.getElementById('offer-section');
                if (offerSection) {
                    offerSection.style.display = offerSettings.visible ? 'block' : 'none';
                }

                // تحديث عنوان العروض
                const badgeEl = document.getElementById('offerBadge');
                const titleEl = document.getElementById('offerTitle');
                if (badgeEl) badgeEl.textContent = offerSettings.badge || '✨ عروضنا المميزة ✨';
                if (titleEl) titleEl.textContent = offerSettings.title || 'أفضل العروض لفترة محدودة';

                // حفظ المنتجات الرئيسية
                featuredProducts = offerSettings.featuredProducts || [];
                
                // عرض المنتجات الرئيسية في السلايدر
                initSlider();
                
            } catch (error) {
                console.error("خطأ في تحميل المنتجات:", error);
                // عرض منتجات افتراضية في حالة الخطأ
                featuredProducts = [
                    {
                        name: 'بوكس رمضان دوائر ميني',
                        price: '33.15',
                        image: 'https://l.top4top.io/p_3716sv58p0.png',
                        calories: '580 سعرة',
                        time: '14 دقيقة',
                        desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني',
                        whatsapp: '966595711777'
                    }
                ];
                initSlider();
            }
        }

        // ================== تهيئة السلايدر (معدلة لدعم RTL) ==================
        function initSlider() {
            const container = document.getElementById('featured-products-container');
            if (!container) return;
            
            // التأكد من وجود منتجات
            if (!featuredProducts || featuredProducts.length === 0) {
                featuredProducts = [{
                    name: 'بوكس رمضان دوائر ميني',
                    price: '33.15',
                    image: 'https://l.top4top.io/p_3716sv58p0.png',
                    calories: '580 سعرة',
                    time: '14 دقيقة',
                    desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني',
                    whatsapp: '966595711777'
                }];
            }
            
            // مسح المحتوى القديم
            container.innerHTML = '';
            
            // إنشاء هيكل السلايدر
            const sliderContainer = document.createElement('div');
            sliderContainer.className = 'featured-slider-container';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'featured-slider-wrapper';
            wrapper.id = 'featuredSliderWrapper';
            // ضبط الاتجاه للـ RTL
            wrapper.style.flexDirection = 'row';
            
            const controls = document.createElement('div');
            controls.className = 'featured-slider-controls';
            controls.innerHTML = `
                <button class="featured-slider-btn" id="featuredNextBtn" aria-label="التالي">❮</button>
                <button class="featured-slider-btn" id="featuredPrevBtn" aria-label="السابق">❯</button>
            `;
            
            const dotsContainer = document.createElement('div');
            dotsContainer.className = 'featured-slider-dots';
            dotsContainer.id = 'featuredSliderDots';
            
            sliderContainer.appendChild(wrapper);
            sliderContainer.appendChild(controls);
            sliderContainer.appendChild(dotsContainer);
            container.appendChild(sliderContainer);
            
            sliderWrapper = document.getElementById('featuredSliderWrapper');
            const dotsCont = document.getElementById('featuredSliderDots');
            const nextBtn = document.getElementById('featuredNextBtn');
            const prevBtn = document.getElementById('featuredPrevBtn');
            
            if (!sliderWrapper) return;
            
            totalSlides = featuredProducts.length;
            dots = [];
            
            // إضافة الشرائح
            featuredProducts.forEach((product, index) => {
                const slide = document.createElement('div');
                slide.className = 'featured-slide';
                
                slide.innerHTML = `
                    <div class="product-card" data-product-index="${index}">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/200/2b3393/ffffff?text=صورة';">
                        </div>
                        <div class="product-info">
                            <div class="product-title">${product.name}</div>
                            <div class="product-desc">${product.desc || ''}</div>
                            <div class="price">${product.price} ريال</div>
                            <div class="product-actions">
                                <div class="quantity-control">
                                    <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('featured-${index}', -1)">−</button>
                                    <span class="qty-value" id="qty-featured-${index}">1</span>
                                    <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('featured-${index}', 1)">+</button>
                                </div>
                                <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCartFromCard('${index}')">
                                    <i class="fas fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                sliderWrapper.appendChild(slide);
                
                // إضافة نقاط المؤشر
                const dot = document.createElement('span');
                dot.className = `featured-dot ${index === 0 ? 'active' : ''}`;
                dot.setAttribute('data-index', index);
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    goToSlide(index);
                });
                dots.push(dot);
                dotsCont.appendChild(dot);
            });
            
            // إضافة مستمعي الأحداث للأزرار (معكوسة لـ RTL)
            if (nextBtn) {
                nextBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    nextSlide();
                });
            }
            if (prevBtn) {
                prevBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    prevSlide();
                });
            }
            
            // بدء التشغيل التلقائي
            startAutoSlide();
            
            // إيقاف التشغيل التلقائي عند التحويم
            sliderWrapper.addEventListener('mouseenter', stopAutoSlide);
            sliderWrapper.addEventListener('mouseleave', startAutoSlide);
            
            // دعم اللمس للجوال مع مراعاة RTL
            let touchStartX = 0;
            let touchEndX = 0;
            
            sliderWrapper.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                stopAutoSlide();
            }, { passive: true });
            
            sliderWrapper.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                
                // في وضع RTL، الاتجاه معكوس
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        // سحب لليسار = السابق في RTL
                        prevSlide();
                    } else {
                        // سحب لليمين = التالي في RTL
                        nextSlide();
                    }
                }
                startAutoSlide();
            }, { passive: true });
        }

        // ================== دوال السلايدر (معدلة لـ RTL) ==================
        function goToSlide(index) {
            if (isTransitioning || !sliderWrapper) return;
            
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            
            isTransitioning = true;
            currentSlide = index;
            
            // في RTL نستخدم translateX موجب للتحريك لليمين
            sliderWrapper.style.transform = `translateX(${currentSlide * 100}%)`;
            
            dots.forEach((dot, i) => {
                if (i === currentSlide) dot.classList.add('active');
                else dot.classList.remove('active');
            });
            
            setTimeout(() => { isTransitioning = false; }, 500);
        }

        function nextSlide() {
            if (isTransitioning || totalSlides <= 1) return;
            currentSlide = (currentSlide + 1) % totalSlides;
            goToSlide(currentSlide);
        }

        function prevSlide() {
            if (isTransitioning || totalSlides <= 1) return;
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            goToSlide(currentSlide);
        }

        function startAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            if (totalSlides > 1) {
                autoSlideInterval = setInterval(() => {
                    if (!isTransitioning) nextSlide();
                }, 5000);
            }
        }

        function stopAutoSlide() {
            if (autoSlideInterval) {
                clearInterval(autoSlideInterval);
                autoSlideInterval = null;
            }
        }

        // ================== تخزين الكميات المؤقتة ==================
        let tempQuantities = {};

        window.adjustQuantity = function(productId, change) {
            const qtyElement = document.getElementById(`qty-${productId}`);
            if (qtyElement) {
                let currentQty = parseInt(qtyElement.textContent) || 1;
                currentQty = Math.max(1, currentQty + change);
                qtyElement.textContent = currentQty;
                tempQuantities[productId] = currentQty;
            }
        };

        // ================== عرض المنتجات ==================
        function displayProducts(products) {
            const sections = {
                sauces: document.getElementById('sauces-list'),
                sandwich: document.getElementById('sandwich-list'),
                circles: document.getElementById('circles-list'),
                hummus: document.getElementById('hummus-list'),
                drinks: document.getElementById('drinks-list'),
                boxes: document.getElementById('boxes-list')
            };

            for (let key in sections) {
                if (sections[key]) sections[key].innerHTML = '';
            }

            products.forEach(product => {
                const section = sections[product.category];
                if (section && product.status === 'active') {
                    const productRow = document.createElement('div');
                    productRow.className = 'product-row';
                    
                    // إنشاء ID فريد للمنتج
                    const productId = `product-${product.id}`;
                    
                    productRow.innerHTML = `
                        <div class="product-left" onclick="openModal(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/75/2b3393/ffffff?text=img';">
                            <span class="product-name">${product.name}</span>
                        </div>
                        <div class="product-price">${product.price} ريال</div>
                        <div class="product-actions">
                            <div class="quantity-control">
                                <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('${productId}', -1)">−</button>
                                <span class="qty-value" id="qty-${productId}">1</span>
                                <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('${productId}', 1)">+</button>
                            </div>
                            <button class="add-to-cart-small" onclick="addToCartFromRow(${JSON.stringify(product).replace(/"/g, '&quot;')}, '${productId}')">
                                <i class="fas fa-cart-plus"></i>
                            </button>
                        </div>
                    `;
                    
                    section.appendChild(productRow);
                }
            });
        }

        // ================== دوال الإضافة من الصف ==================
        window.addToCartFromRow = function(product, quantityId) {
            const qtyElement = document.getElementById(`qty-${quantityId}`);
            const quantity = qtyElement ? parseInt(qtyElement.textContent) : 1;
            
            addToCart({
                id: product.id,
                name: product.name,
                price: product.price,
                image: product.image
            }, quantity);
            
            // إعادة تعيين العداد إلى 1 بعد الإضافة
            if (qtyElement) {
                qtyElement.textContent = '1';
            }
        };

        window.addToCartFromCard = function(index) {
            const product = featuredProducts[index];
            if (product) {
                const qtyElement = document.getElementById(`qty-featured-${index}`);
                const quantity = qtyElement ? parseInt(qtyElement.textContent) : 1;
                
                addToCart({
                    id: `featured-${index}`,
                    name: product.name,
                    price: product.price,
                    image: product.image
                }, quantity);
                
                // إعادة تعيين العداد إلى 1 بعد الإضافة
                if (qtyElement) {
                    qtyElement.textContent = '1';
                }
            }
        };

        // ================== دوال إضافية ==================
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
        window.clearCart = function() {
            cart = [];
            updateCartDisplay();
        };

        // دالة فتح المودال
        window.openModal = function(product) {
            const modal = document.getElementById('productModal');
            const modalImg = document.getElementById('modalImg');
            const modalName = document.getElementById('modalName');
            const modalDesc = document.getElementById('modalDesc');
            const modalPrice = document.getElementById('modalPrice');
            const modalCalories = document.getElementById('modalCalories');
            const modalTime = document.getElementById('modalTime');
            
            if (modalImg) modalImg.src = product.image || 'https://via.placeholder.com/300';
            if (modalName) modalName.innerText = product.name || 'منتج';
            if (modalDesc) modalDesc.innerText = product.desc || 'وصف المنتج';
            if (modalPrice) modalPrice.innerText = (product.price || '0') + ' ريال';
            if (modalCalories) modalCalories.innerText = product.calories || '---';
            if (modalTime) modalTime.innerText = product.time || '---';
            
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeModal = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target.classList.contains('modal-overlay') || event.target.closest('.modal-close')) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        };

        // دالة التمرير للأقسام
        window.goTo = function(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                document.querySelectorAll('.categories button').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            }
        };

        // تحميل المنتجات
        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>

    <style>
        :root {
            --main: #2b3393;
            --secondary: #f8c81c;
            --light-bg: #f5f6fc;
            --shadow-sm: 0 10px 25px rgba(0,0,0,0.08);
            --shadow-hover: 0 20px 35px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--light-bg);
            scroll-behavior: smooth;
            padding-bottom: 80px;
        }

        /* ===== أنماط السلة ===== */
        .cart-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--main);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(43, 51, 147, 0.4);
            z-index: 1000;
            transition: var(--transition);
            border: 3px solid var(--secondary);
        }

        .cart-float:hover {
            transform: scale(1.1);
        }

        .cart-float i {
            font-size: 24px;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--secondary);
            color: var(--main);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;

                <img src="" alt="product" id="modalImg">

                <h2 id="modalName"></h2>
                <div class="modal-meta">
                    <span><i class="fas fa-fire"></i> <span id="modalCalories"></span></span>
                    <span><i class="fas fa-clock"></i> <span id="modalTime"></span></span>

    <script>
        // دوال إضافية للتحكم في السلة
        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function toggleDeliveryNote(radio) {
            const note = document.getElementById('deliveryNote');
            if (radio.value === 'توصيل') {
                note.style.display = 'block';
            } else {
                note.style.display = 'none';
            }
        }

        // إظهار الملاحظة افتراضياً
        document.addEventListener('DOMContentLoaded', function() {
            const note = document.getElementById('deliveryNote');
            if (note) note.style.display = 'block';
        });

        // إغلاق السلة عند الضغط على زر ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('cartSidebar');
                const overlay = document.getElementById('overlay');
                if (sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                }
                
                const modal = document.getElementById('productModal');
                if (modal.classList.contains('active')) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
            }
        });
    </script>
