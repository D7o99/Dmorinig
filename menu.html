<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دوائر | قائمة الطعام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script type="module">
        // ================== استيراد Firebase ==================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARoaXISEB8yiCmes_EmZLhb-8ZtbwOR-k",
            authDomain: "dmorinig-f29d9.firebaseapp.com",
            projectId: "dmorinig-f29d9",
            storageBucket: "dmorinig-f29d9.firebasestorage.app",
            messagingSenderId: "813644062004",
            appId: "1:813644062004:web:e822278f6ee5f2f6f05961",
            measurementId: "G-77LJ79TDS2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ================== تحميل المنتجات ==================
        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });

                // ترتيب المنتجات من الأحدث
                products.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                
                // عرض المنتجات في الأقسام
                displayProducts(products);
                
            } catch (error) {
                console.error("خطأ في تحميل المنتجات:", error);
            }
        }

        // ================== عرض المنتجات ==================
        function displayProducts(products) {
            // تعريف الأقسام
            const sections = {
                sauces: document.getElementById('sauces-list'),
                sandwich: document.getElementById('sandwich-list'),
                circles: document.getElementById('circles-list'),
                hummus: document.getElementById('hummus-list'),
                drinks: document.getElementById('drinks-list'),
                boxes: document.getElementById('boxes-list'),
                specials: document.getElementById('specials-list')
            };

            // مسح المحتوى القديم
            for (let key in sections) {
                if (sections[key]) {
                    sections[key].innerHTML = '';
                }
            }

            // إضافة المنتجات لكل قسم
            products.forEach(product => {
                const section = sections[product.category];
                if (section) {
                    const productRow = document.createElement('div');
                    productRow.className = 'product-row';
                    
                    // إضافة حدث النقر مباشرة بدلاً من onclick في HTML
                    productRow.addEventListener('click', function() {
                        openModal(product);
                    });
                    
                    productRow.innerHTML = `
                        <div class="product-left">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/75/2b3393/ffffff?text=img';">
                            <span class="product-name">${product.name}</span>
                        </div>
                        <div class="product-price">${product.price} ريال</div>
                    `;
                    
                    section.appendChild(productRow);
                }
            });

            // إظهار رسالة إذا كان القسم فارغاً
            for (let key in sections) {
                if (sections[key] && sections[key].children.length === 0) {
                    sections[key].innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">لا توجد منتجات في هذا القسم</div>';
                }
            }
        }

        // تحميل المنتجات عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', loadProducts);
        
        // ================== دالة فتح المودال (عامة) ==================
        window.openModal = function(product) {
            console.log('فتح المودال:', product); // للتأكد من وصول البيانات
            
            document.getElementById('modalImg').src = product.image || 'https://via.placeholder.com/300';
            document.getElementById('modalName').innerText = product.name || 'منتج';
            document.getElementById('modalCategory').innerText = product.category || 'قسم';
            document.getElementById('modalDesc').innerText = product.desc || 'وصف المنتج';
            document.getElementById('modalPrice').innerText = (product.price || '0') + ' ريال';
            document.getElementById('modalCalories').innerText = product.calories || '---';
            document.getElementById('modalTime').innerText = product.time || '---';
            
            let message = encodeURIComponent(`مرحباً، أريد طلب ${product.name} - السعر: ${product.price} ريال`);
            document.getElementById('modalWhatsapp').href = `https://wa.me/966595711777?text=${message}`;
            
            document.getElementById('productModal').classList.add('active');
        };

        // دالة إغلاق المودال
        window.closeModal = function(event) {
            if (event.target.classList.contains('modal-overlay') || event.target.closest('.modal-close')) {
                document.getElementById('productModal').classList.remove('active');
            }
        };

        // إغلاق المودال بزر ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('productModal').classList.remove('active');
            }
        });

        // دالة التمرير للأقسام
        window.goTo = function(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };
    </script>

        .order-btn {

        /* المودال */

            left: 0;

        .modal-content {

/* ===== السلايدر (كاروسيل) ===== */

    position: relative;
    max-width: 100%;
    margin: 20px auto 30px;
    overflow: hidden;
    border-radius: 25px;
    box-shadow: var(--shadow-hover);
    border: 0px solid var(--secondary);
}

.slider-wrapper {
    display: flex;
    transition: transform 0.5s ease-in-out;
}

.slider-slide {
    min-width: 100%;
    position: relative;
    border-radius: 22px;
    overflow: hidden;
}

.slider-slide img {
    width: 100%;
    height: auto;
    max-height: 400px;
    object-fit: cover;
    display: block;
    border: 4px solid var(--main);
    border-radius: 20px;
    box-sizing: border-box;
}

.slider-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(43, 51, 147, 0.9), transparent);
    color: white;
    padding: 30px 20px 20px;
    text-align: center;
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 20px;
}

.slider-caption h3 {
    font-size: 1.8rem;
    margin-bottom: 5px;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.slider-caption p {
    font-size: 1.2rem;
    opacity: 0.9;
}

/* أزرار التحكم */
.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(248, 200, 28, 0.8);
    color: var(--main);
    border: 2px solid var(--main);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.slider-btn:hover {
    background: var(--secondary);
    transform: translateY(-50%) scale(1.1);
    border-color: var(--secondary);
}

.slider-btn-prev {
    left: 20px;
}

.slider-btn-next {
    right: 20px;
}

/* نقاط المؤشر */
.slider-dots {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: var(--transition);
    border: 2px solid var(--main);
}

.dot.active {
    background: var(--secondary);
    transform: scale(1.3);
    border-color: var(--secondary);
}

/* تحسينات للشاشات الصغيرة */
@media (max-width: 768px) {
    .slider-caption h3 {
        font-size: 1.3rem;
    }
    
    .slider-caption p {
        font-size: 1rem;
    }
    
    .slider-btn {
        width: 40px;
        height: 40px;
        font-size: 1.5rem;
    }
}

@media (max-width: 480px) {
    .slider-caption h3 {
        font-size: 1.1rem;
    }
    
    .slider-caption p {
        font-size: 0.9rem;
    }
    
    .slider-caption {
        padding: 15px 10px 10px;
    }
}



    </style>
</head>
<body>

    <!-- الهيدر الثابت -->
    <div class="sticky-header">
        <div class="logo-container">
            <img src="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg" alt="لوجو" onerror="this.src='https://via.placeholder.com/150x55/2b3393/ffffff?text=Logo';">

            <button onclick="goTo('boxes')">البوكسات</button>

            <button onclick="goTo('sauces')">الصوصات</button>
        </div>
    </div>



        <!-- العنوان -->

        <h2 id="sandwich" class="section-heading scroll-margin"> الساندويتش</h2>
        <div class="product-list" id="sandwich-list"></div>

        <!-- قسم الدوائر -->
        <h2 id="circles" class="section-heading scroll-margin"> الدوائر</h2>
        <div class="product-list" id="circles-list"></div>

        <!-- قسم الحمسات -->
        <h2 id="hummus" class="section-heading scroll-margin"> الحمسات</h2>

<script>
    // ================== السلايدر (كاروسيل) ==================
    document.addEventListener('DOMContentLoaded', function() {
        const sliderWrapper = document.getElementById('sliderWrapper');
        const slides = document.querySelectorAll('.slider-slide');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const dotsContainer = document.getElementById('sliderDots');
        
        let currentIndex = 0;
        const totalSlides = slides.length;

        // إنشاء النقاط
        function createDots() {
            dotsContainer.innerHTML = '';
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('span');
                dot.classList.add('dot');
                if (i === 0) dot.classList.add('active');
                dot.addEventListener('click', () => goToSlide(i));
                dotsContainer.appendChild(dot);
            }
        }

        // تحديث النقاط
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if (index === currentIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // الانتقال إلى شريحة معينة
        function goToSlide(index) {
            currentIndex = index;
            sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateDots();
        }

        // الشريحة التالية
        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            goToSlide(currentIndex);
        }

        // الشريحة السابقة
        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            goToSlide(currentIndex);
        }

        // إضافة مستمعي الأحداث
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);

        // التبديل التلقائي كل 5 ثواني
        let autoSlideInterval = setInterval(nextSlide, 5000);

        // إيقاف التبديل التلقائي عند التحويم
        sliderWrapper.addEventListener('mouseenter', () => {
            clearInterval(autoSlideInterval);
        });

        sliderWrapper.addEventListener('mouseleave', () => {
            autoSlideInterval = setInterval(nextSlide, 5000);
        });

        // دعم اللمس للجوال
        let touchStartX = 0;
        let touchEndX = 0;

        sliderWrapper.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        sliderWrapper.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) {
                // سحب لليسار (الشريحة التالية)
                nextSlide();
            } else if (touchEndX - touchStartX > 50) {
                // سحب لليمين (الشريحة السابقة)
                prevSlide();
            }
        });

        // تهيئة السلايدر
        createDots();
        goToSlide(0);
    });
</script>
