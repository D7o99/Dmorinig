<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dmorning | قائمة الطعام</title>
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg">
    <link rel="shortcut icon" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/qMCd3wgR/IMG-6048.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARoaXISEB8yiCmes_EmZLhb-8ZtbwOR-k",
            authDomain: "dmorinig-f29d9.firebaseapp.com",
            projectId: "dmorinig-f29d9",
            storageBucket: "dmorinig-f29d9.firebasestorage.app",
            messagingSenderId: "813644062004",
            appId: "1:813644062004:web:e822278f6ee5f2f6f05961"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ===== CART STATE =====
        let cart = [];
        const whatsappNumber = "966595711777";
        let currentSlide = 0;
        let totalSlides = 0;
        let autoSlideInterval;
        let isTransitioning = false;
        let sliderWrapper = null;
        let dots = [];
        let featuredProducts = [];

        // ===== CART FUNCTIONS (unchanged) =====
        function addToCart(product, quantity = 1) {
            const existingItem = cart.find(item => item.id === product.id);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({ id: product.id, name: product.name, price: product.price, quantity: quantity, image: product.image });
            }
            updateCartDisplay();
            showNotification(`تمت إضافة ${product.name} إلى السلة`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartDisplay();
        }

        function updateQuantity(productId, newQuantity) {
            if (newQuantity <= 0) { removeFromCart(productId); return; }
            const item = cart.find(item => item.id === productId);
            if (item) { item.quantity = newQuantity; updateCartDisplay(); }
        }

        function updateCartDisplay() {
            const cartItems = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');
            const emptyCart = document.getElementById('empty-cart');
            const cartContent = document.getElementById('cart-content');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (cartCount) { cartCount.textContent = totalItems; cartCount.style.display = totalItems > 0 ? 'flex' : 'none'; }
            if (cartItems) {
                if (cart.length === 0) {
                    if (emptyCart) emptyCart.style.display = 'block';
                    if (cartContent) cartContent.style.display = 'none';
                } else {
                    if (emptyCart) emptyCart.style.display = 'none';
                    if (cartContent) cartContent.style.display = 'block';
                    cartItems.innerHTML = cart.map(item => `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/60/2b3393/ffffff?text=img';">
                            <div class="cart-item-details">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">${item.price} ريال</div>
                            </div>
                            <div class="cart-item-quantity">
                                <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity - 1})">−</button>
                                <span class="cart-qty-value">${item.quantity}</span>
                                <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
                            </div>
                            <button class="cart-item-remove" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button>
                        </div>`).join('');
                    const total = cart.reduce((sum, item) => sum + (parseFloat(item.price) * item.quantity), 0);
                    if (cartTotal) cartTotal.textContent = total.toFixed(2);
                }
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add('show'), 10);
            setTimeout(() => { notification.classList.remove('show'); setTimeout(() => notification.remove(), 300); }, 3000);
        }

        window.sendOrderViaWhatsApp = function() {
            if (cart.length === 0) { showNotification('السلة فارغة! أضف منتجات أولاً'); return; }
            const deliveryMethod = document.querySelector('input[name="delivery"]:checked')?.value || 'استلام';
            let orderDetails = '📋 *تفاصيل الطلب:*\n\n';
            cart.forEach(item => { orderDetails += `• ${item.name} (${item.quantity})\n`; });
            orderDetails += `\n📦 *طريقة الاستلام:* ${deliveryMethod}`;
            window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(orderDetails)}`, '_blank');
        };

        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
        window.clearCart = function() { cart = []; updateCartDisplay(); };

        // ===== LOAD PRODUCTS =====
        async function loadProducts() {
            try {
                const [productsSnapshot, settingsSnapshot] = await Promise.all([
                    getDocs(collection(db, "products")),
                    getDocs(collection(db, "settings"))
                ]);

                const products = [];
                productsSnapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));

                let offerSettings = {
                    visible: true,
                    badge: '✨ أصنافنا الرمضانية ✨',
                    title: 'طعم السعادة .. على سفرتك ويكمل جمعتك',
                    featuredProducts: [{ name: 'بوكس رمضان دوائر ميني', price: '33.15', image: 'https://l.top4top.io/p_3716sv58p0.png', calories: '580 سعرة', time: '14 دقيقة', desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني', whatsapp: '966595711777' }]
                };

                let socialSettings = { whatsapp: 'https://wa.me/966595711777', instagram: '#', tiktok: 'https://www.tiktok.com/@dmorning.bf', snapchat: 'https://snapchat.com/t/858BelPL' };

                settingsSnapshot.forEach(doc => {
                    if (doc.id === 'offer') offerSettings = { ...offerSettings, ...doc.data() };
                    if (doc.id === 'social') socialSettings = { ...socialSettings, ...doc.data() };
                });

                products.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                displayProducts(products);

                // Update social links
                const whatsappLink = document.getElementById('socialWhatsapp');
                const instagramLink = document.getElementById('socialInstagram');
                const tiktokLink = document.getElementById('socialTiktok');
                const snapchatLink = document.getElementById('socialSnapchat');
                if (whatsappLink && socialSettings.whatsapp) whatsappLink.href = socialSettings.whatsapp;
                if (instagramLink && socialSettings.instagram) instagramLink.href = socialSettings.instagram;
                if (tiktokLink && socialSettings.tiktok) tiktokLink.href = socialSettings.tiktok;
                if (snapchatLink && socialSettings.snapchat) snapchatLink.href = socialSettings.snapchat;

                const offerSection = document.getElementById('offer-section');
                if (offerSection) offerSection.style.display = offerSettings.visible ? 'block' : 'none';
                const badgeEl = document.getElementById('offerBadge');
                const titleEl = document.getElementById('offerTitle');
                if (badgeEl) badgeEl.textContent = offerSettings.badge || '✨ عروضنا المميزة ✨';
                if (titleEl) titleEl.textContent = offerSettings.title || 'أفضل العروض لفترة محدودة';

                featuredProducts = (offerSettings.featuredProducts || []).filter(p => p.visible !== false);
                initSlider();

                // Record visit
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const visitRef = doc(db, "analytics", "visits");
                    const snap = await getDoc(visitRef);
                    const visits = snap.exists() ? snap.data() : {};
                    visits[today] = (visits[today] || 0) + 1;
                    await setDoc(visitRef, visits);
                } catch(e) {}

            } catch (error) {
                console.error(error);
                featuredProducts = [{ name: 'بوكس رمضان دوائر ميني', price: '33.15', image: 'https://l.top4top.io/p_3716sv58p0.png', calories: '580 سعرة', time: '14 دقيقة', desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني', whatsapp: '966595711777' }];
                initSlider();
            }
        }

        // ===== SLIDER =====
        function initSlider() {
            const container = document.getElementById('featured-products-container');
            if (!container) return;
            if (!featuredProducts || featuredProducts.length === 0) {
                featuredProducts = [{ name: 'بوكس رمضان دوائر ميني', price: '33.15', image: 'https://l.top4top.io/p_3716sv58p0.png', calories: '580 سعرة', time: '14 دقيقة', desc: '4 دوائر فلافل ميني · 4 دوائر حلوم ميني · 4 دوائر دجاج ميني · 4 دوائر تونه ميني', whatsapp: '966595711777' }];
            }
            container.innerHTML = '';
            const sliderContainer = document.createElement('div');
            sliderContainer.className = 'featured-slider-container';
            const wrapper = document.createElement('div');
            wrapper.className = 'featured-slider-wrapper';
            wrapper.id = 'featuredSliderWrapper';
            const dotsContainer = document.createElement('div');
            dotsContainer.className = 'featured-slider-dots';
            dotsContainer.id = 'featuredSliderDots';

            if (featuredProducts.length > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'slider-nav-btn slider-prev';
                prevBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
                prevBtn.setAttribute('aria-label', 'السابق');
                const nextBtn = document.createElement('button');
                nextBtn.className = 'slider-nav-btn slider-next';
                nextBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
                nextBtn.setAttribute('aria-label', 'التالي');
                sliderContainer.appendChild(prevBtn);
                sliderContainer.appendChild(nextBtn);
                prevBtn.addEventListener('click', e => { e.stopPropagation(); prevSlide(); });
                nextBtn.addEventListener('click', e => { e.stopPropagation(); nextSlide(); });
            }

            sliderContainer.appendChild(wrapper);
            sliderContainer.appendChild(dotsContainer);
            container.appendChild(sliderContainer);
            sliderWrapper = document.getElementById('featuredSliderWrapper');
            const dotsCont = document.getElementById('featuredSliderDots');
            totalSlides = featuredProducts.length;
            dots = [];
            currentSlide = 0;

            featuredProducts.forEach((product, index) => {
                const slide = document.createElement('div');
                slide.className = 'featured-slide';
                slide.innerHTML = `
                    <div class="featured-card">
                        <div class="featured-card-img-wrap">
                            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/200/2b3393/ffffff?text=صورة';">
                        </div>
                        <div class="featured-card-body">
                            <div class="featured-card-name">${product.name}</div>
                            <div class="featured-card-desc">${product.desc || ''}</div>
                            <div class="featured-card-meta">
                                ${product.calories && product.calories !== '---' ? `<span><i class="fas fa-fire"></i> ${product.calories}</span>` : ''}
                                ${product.time && product.time !== '---' ? `<span><i class="fas fa-clock"></i> ${product.time}</span>` : ''}
                            </div>
                            <div class="featured-card-footer">
                                <div class="featured-card-price">${product.price} <span>ريال</span></div>
                                <div class="featured-card-actions">
                                    <div class="quantity-control">
                                        <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('featured-${index}', -1)">−</button>
                                        <span class="qty-value" id="qty-featured-${index}">1</span>
                                        <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('featured-${index}', 1)">+</button>
                                    </div>
                                    <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCartFromCard('${index}')">
                                        <i class="fas fa-cart-plus"></i>
                                        <span>أضف للسلة</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                wrapper.appendChild(slide);

                if (featuredProducts.length > 1) {
                    const dot = document.createElement('span');
                    dot.className = `featured-dot ${index === 0 ? 'active' : ''}`;
                    dot.addEventListener('click', e => { e.stopPropagation(); goToSlide(index); });
                    dots.push(dot);
                    dotsCont.appendChild(dot);
                }
            });

            sliderWrapper.addEventListener('mouseenter', stopAutoSlide);
            sliderWrapper.addEventListener('mouseleave', startAutoSlide);
            let touchStartX = 0;
            sliderWrapper.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; stopAutoSlide(); }, { passive: true });
            sliderWrapper.addEventListener('touchend', e => {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 50) { diff > 0 ? prevSlide() : nextSlide(); }
                startAutoSlide();
            }, { passive: true });

            startAutoSlide();
        }

        function goToSlide(index) {
            if (isTransitioning || !sliderWrapper) return;
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            isTransitioning = true;
            currentSlide = index;
            sliderWrapper.style.transform = `translateX(${currentSlide * 100}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
            setTimeout(() => { isTransitioning = false; }, 500);
        }

        function nextSlide() { if (!isTransitioning && totalSlides > 1) goToSlide((currentSlide + 1) % totalSlides); }
        function prevSlide() { if (!isTransitioning && totalSlides > 1) goToSlide((currentSlide - 1 + totalSlides) % totalSlides); }
        function startAutoSlide() { if (autoSlideInterval) clearInterval(autoSlideInterval); if (totalSlides > 1) autoSlideInterval = setInterval(() => { if (!isTransitioning) nextSlide(); }, 5000); }
        function stopAutoSlide() { if (autoSlideInterval) { clearInterval(autoSlideInterval); autoSlideInterval = null; } }

        // ===== QUANTITIES =====
        window.adjustQuantity = function(productId, change) {
            const el = document.getElementById(`qty-${productId}`);
            if (el) { let q = Math.max(1, parseInt(el.textContent) + change); el.textContent = q; }
        };

        // ===== DISPLAY PRODUCTS =====
        function displayProducts(products) {
            // Get all category IDs
            const allCategories = ['sauces','sandwich','circles','hummus','drinks','boxes','specials'];
            allCategories.forEach(key => {
                const el = document.getElementById(`${key}-list`);
                if (el) el.innerHTML = '';
                const section = document.getElementById(`section-${key}`);
                if (section) section.style.display = 'none';
            });

            const categorized = {};
            products.forEach(product => {
                if (product.status === 'active') {
                    if (!categorized[product.category]) categorized[product.category] = [];
                    categorized[product.category].push(product);
                }
            });

            Object.keys(categorized).forEach(cat => {
                const list = document.getElementById(`${cat}-list`);
                const section = document.getElementById(`section-${cat}`);
                if (section) section.style.display = 'block';
                if (!list) return;
                categorized[cat].forEach(product => {
                    const productId = `product-${product.id}`;
                    const row = document.createElement('div');
                    row.className = 'product-row';
                    row.innerHTML = `
                        <div class="product-left" onclick="openModal(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                            <div class="product-img-wrap">
                                <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/75/2b3393/ffffff?text=img';">
                            </div>
                            <div class="product-info">
                                <span class="product-name">${product.name}</span>
                                ${product.desc ? `<span class="product-desc-sm">${product.desc.substring(0,50)}${product.desc.length > 50 ? '...' : ''}</span>` : ''}
                                ${product.calories && product.calories !== '---' ? `<span class="product-meta-sm"><i class="fas fa-fire"></i> ${product.calories}</span>` : ''}
                            </div>
                        </div>
                        <div class="product-right">
                            <div class="product-price">${product.price} <small>ر.س</small></div>
                            <div class="product-actions">
                                <div class="quantity-control">
                                    <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('${productId}', -1)">−</button>
                                    <span class="qty-value" id="qty-${productId}">1</span>
                                    <button class="qty-btn" onclick="event.stopPropagation(); adjustQuantity('${productId}', 1)">+</button>
                                </div>
                                <button class="add-to-cart-small" onclick="addToCartFromRow(${JSON.stringify(product).replace(/"/g, '&quot;')}, '${productId}')">
                                    <i class="fas fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>`;
                    list.appendChild(row);
                });
            });

            // Update category buttons visibility
            updateCategoryButtons(Object.keys(categorized));
        }

        function updateCategoryButtons(activeCategories) {
            document.querySelectorAll('.cat-btn[data-section]').forEach(btn => {
                const sec = btn.getAttribute('data-section');
                btn.style.display = activeCategories.includes(sec) ? '' : 'none';
            });
        }

        // ===== ADD TO CART =====
        window.addToCartFromRow = function(product, quantityId) {
            const el = document.getElementById(`qty-${quantityId}`);
            const quantity = el ? parseInt(el.textContent) : 1;
            addToCart({ id: product.id, name: product.name, price: product.price, image: product.image }, quantity);
            if (el) el.textContent = '1';
        };

        window.addToCartFromCard = function(index) {
            const product = featuredProducts[index];
            if (product) {
                const el = document.getElementById(`qty-featured-${index}`);
                const quantity = el ? parseInt(el.textContent) : 1;
                addToCart({ id: `featured-${index}`, name: product.name, price: product.price, image: product.image }, quantity);
                if (el) el.textContent = '1';
            }
        };

        // ===== MODAL =====
        window.openModal = function(product) {
            const modal = document.getElementById('productModal');
            document.getElementById('modalImg').src = product.image || '';
            document.getElementById('modalName').innerText = product.name || '';
            document.getElementById('modalDesc').innerText = product.desc || 'وصف المنتج';
            document.getElementById('modalPrice').innerText = (product.price || '0') + ' ريال';
            document.getElementById('modalCalories').innerText = product.calories || '---';
            document.getElementById('modalTime').innerText = product.time || '---';
            // Setup modal cart
            const modalQtyEl = document.getElementById('modalQty');
            if (modalQtyEl) modalQtyEl.textContent = '1';
            window._modalProduct = product;
            if (modal) { modal.classList.add('active'); document.body.style.overflow = 'hidden'; }
        };

        window.adjustModalQty = function(change) {
            const el = document.getElementById('modalQty');
            if (el) el.textContent = Math.max(1, parseInt(el.textContent) + change);
        };

        window.addModalToCart = function() {
            if (!window._modalProduct) return;
            const qty = parseInt(document.getElementById('modalQty').textContent) || 1;
            addToCart({ id: window._modalProduct.id, name: window._modalProduct.name, price: window._modalProduct.price, image: window._modalProduct.image }, qty);
            window.closeModal({ target: { classList: { contains: () => true } } });
        };

        window.closeModal = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target.classList.contains('modal-overlay') || (event.target.closest && event.target.closest('.modal-close'))) {
                modal.classList.remove('active'); document.body.style.overflow = '';
            }
        };

        window.goTo = function(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
                if (event && event.target) event.target.classList.add('active');
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            // Intersection Observer for active category
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        document.querySelectorAll('.cat-btn').forEach(btn => {
                            btn.classList.toggle('active', btn.getAttribute('data-section') === id || (id === 'offer-section' && btn.getAttribute('data-section') === 'offer-section'));
                        });
                    }
                });
            }, { threshold: 0.3, rootMargin: '-100px 0px -50% 0px' });

            document.querySelectorAll('.scroll-margin').forEach(el => observer.observe(el));
        });
    </script>

    <style>
        :root {
            --main: #2b3393;
            --main-light: #3d47b5;
            --secondary: #f8c81c;
            --light-bg: #f5f6fc;
            --shadow-sm: 0 4px 20px rgba(43,51,147,0.08);
            --shadow-hover: 0 12px 35px rgba(43,51,147,0.16);
            --transition: all 0.28s cubic-bezier(.4,0,.2,1);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f0f2fc; }
        ::-webkit-scrollbar-thumb { background: rgba(43,51,147,.25); border-radius: 3px; }

        body { background: var(--light-bg); scroll-behavior: smooth; padding-bottom: 90px; }

        /* ===== CART (unchanged behavior) ===== */
        .cart-float {
            position: fixed; bottom: 22px; left: 22px;
            background: var(--main); color: white;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 24px rgba(43,51,147,.4);
            z-index: 1000; transition: var(--transition);
            border: 3px solid var(--secondary);
        }
        .cart-float:hover { transform: scale(1.1); box-shadow: 0 10px 30px rgba(43,51,147,.5); }
        .cart-float i { font-size: 22px; }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background: var(--secondary); color: var(--main);
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; border: 2px solid white;
        }
        .cart-sidebar {
            position: fixed; top: 0; left: -400px; width: 380px; height: 100vh;
            background: white; box-shadow: -5px 0 30px rgba(0,0,0,.15);
            z-index: 2000; transition: left .3s ease; display: flex; flex-direction: column;
        }
        .cart-sidebar.active { left: 0; }
        .cart-header { background: var(--main); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-size: 20px; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .cart-header button { background: rgba(255,255,255,.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: var(--transition); font-size: 1rem; }
        .cart-header button:hover { background: rgba(255,255,255,.3); transform: rotate(90deg); }
        .cart-body { flex: 1; overflow-y: auto; padding: 20px; }

        .featured-card-actions { display: flex; align-items: center; gap: 8px; }
        .slider-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: white; border: 2px solid var(--secondary); color: var(--main); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); z-index: 10; font-size: .95rem; box-shadow: 0 4px 12px rgba(0,0,0,.1); }

        /* ===== MODAL ===== */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: all .28s ease; padding: 16px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: white; width: 100%; max-width: 380px; border-radius: 24px; overflow: hidden; transform: scale(.92) translateY(10px); transition: transform .28s ease; max-height: 90vh; overflow-y: auto; position: relative; }

        /* ===== RESPONSIVE ===== */
        @media(max-width: 600px) {
            .cart-sidebar { width: 100%; left: -100%; }

            .qty-value { min-width: 22px; font-size: .75rem; }
            .product-img-wrap img { width: 52px; height: 52px; }
        }

    <script>
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleDeliveryNote(radio) {
            const note = document.getElementById('deliveryNote');
            if (note) note.style.display = radio.value === 'توصيل' ? 'block' : 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const note = document.getElementById('deliveryNote');
            if (note) note.style.display = 'block';
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('cartSidebar');
                const overlay = document.getElementById('overlay');
                if (sidebar.classList.contains('active')) { sidebar.classList.remove('active'); overlay.classList.remove('active'); }
                const modal = document.getElementById('productModal');
                if (modal.classList.contains('active')) { modal.classList.remove('active'); document.body.style.overflow = ''; }
            }
        });
    </script>
