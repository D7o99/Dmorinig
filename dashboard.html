<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
    // التحقق من تسجيل الدخول
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }
</script>

<button onclick="logout()" style="background: none; border: none; color: #d33; font-size: 1.2rem; cursor: pointer; margin-right: 15px;" title="تسجيل الخروج">
    <i class="fas fa-sign-out-alt"></i>
</button>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم | إدارة المنتجات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script type="module">
        // ================== استيراد Firebase ==================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARoaXISEB8yiCmes_EmZLhb-8ZtbwOR-k",
            authDomain: "dmorinig-f29d9.firebaseapp.com",
            projectId: "dmorinig-f29d9",
            storageBucket: "dmorinig-f29d9.firebasestorage.app",
            messagingSenderId: "813644062004",
            appId: "1:813644062004:web:e822278f6ee5f2f6f05961"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        // ================== المتغيرات العامة ==================
        let products = [];

        // خريطة الأقسام
        const categoryMap = {
            'sauces': 'الصوصات',
            'sandwich': 'الساندويتش',
            'circles': 'الدوائر',
            'hummus': 'الحمسات',
            'drinks': 'المشروبات',
            'boxes': 'البوكسات',
            'specials': 'تشكيلة خاصة'
        };

        // ================== دوال Firebase ==================
        async function saveToFirebase(product) {
            try {
                const docRef = await addDoc(collection(db, "products"), product);
                return { success: true, id: docRef.id };
            } catch (error) {
                console.error('خطأ في Firebase:', error);
                return { success: false, error: error.message };
            }
        }

        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                updateDisplay();
            } catch (error) {
                console.error('خطأ في التحميل:', error);
            }
        }

        window.deleteProduct = async function(id) {
            if (!confirm('تأكيد الحذف؟')) return;
            try {
                await deleteDoc(doc(db, "products", id));
                alert('✅ تم الحذف');
                await loadProducts();
            } catch (error) {
                alert('❌ فشل الحذف');
            }
        };

        // ================== دوال العرض ==================
        function updateDisplay() {
            updateStats();
            renderTable();
            renderPreview();
        }

        function updateStats() {
            const el = document.getElementById('totalProducts');
            if (el) el.innerText = products.length;
        }

        function renderTable() {
            const tbody = document.getElementById('productsTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            products.forEach(p => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><img src="${p.image}" width="50" height="50" style="border-radius:10px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/50'"></td>
                    <td>${p.name}</td>
                    <td>${categoryMap[p.category] || p.category}</td>
                    <td>${p.price} ريال</td>
                    <td>${p.calories || '---'}</td>
                    <td>${p.time || '---'}</td>
                    <td><button class="action-btn" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button></td>
                `;
            });
        }

        function renderPreview() {
            const div = document.getElementById('recentProductsPreview');
            if (!div) return;
            div.innerHTML = '';
            products.slice(-3).reverse().forEach(p => {
                const card = document.createElement('div');
                card.className = 'preview-card';
                card.innerHTML = `
                    <img src="${p.image}" onerror="this.src='https://via.placeholder.com/60'">
                    <div class="preview-name">${p.name}</div>
                    <div class="preview-price">${p.price} ريال</div>
                `;
                div.appendChild(card);
            });
        }

        // ================== معالجة الصور ==================
        document.addEventListener('DOMContentLoaded', function() {
            // عناصر التحكم بالصورة
            const urlOptionBtn = document.getElementById('urlOptionBtn');
            const fileOptionBtn = document.getElementById('fileOptionBtn');
            const urlInputGroup = document.getElementById('urlInputGroup');
            const fileInputGroup = document.getElementById('fileInputGroup');
            const productImageUrl = document.getElementById('productImageUrl');
            const fileInput = document.getElementById('file-input');
            const imagePreview = document.getElementById('imagePreview');
            const finalImageData = document.getElementById('finalImageData');

            if (urlOptionBtn) {
                urlOptionBtn.addEventListener('click', function() {
                    urlInputGroup.style.display = 'block';
                    fileInputGroup.style.display = 'none';
                    finalImageData.value = productImageUrl.value;
                });
            }

            if (fileOptionBtn) {
                fileOptionBtn.addEventListener('click', function() {
                    urlInputGroup.style.display = 'none';
                    fileInputGroup.style.display = 'block';
                    finalImageData.value = '';
                });
            }

            if (fileInput) {
                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        if (file.size > 2 * 1024 * 1024) {
                            alert('حجم الصورة كبير جداً. الحد الأقصى 2 ميجابايت.');
                            return;
                        }
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            imagePreview.src = ev.target.result;
                            imagePreview.style.display = 'block';
                            finalImageData.value = ev.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
        });

        // ================== معالجة النموذج ==================
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('addProductForm');
            if (!form) return;

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                try {
                    const name = document.getElementById('productName')?.value.trim();
                    const price = document.getElementById('productPrice')?.value.trim();
                    const category = document.getElementById('productCategory')?.value;

                    if (!name || !price || !category) {
                        alert('❌ الرجاء ملء جميع الحقول الإلزامية');
                        return;
                    }

                    let imageUrl = '';
                    const urlGroup = document.getElementById('urlInputGroup');
                    const fileGroup = document.getElementById('fileInputGroup');
                    
                    if (urlGroup && urlGroup.style.display !== 'none') {
                        imageUrl = document.getElementById('productImageUrl')?.value.trim();
                    } else if (fileGroup && fileGroup.style.display !== 'none') {
                        imageUrl = document.getElementById('finalImageData')?.value.trim();
                    }

                    if (!imageUrl) {
                        alert('❌ الرجاء إدخال صورة المنتج');
                        return;
                    }

                    const productData = {
                        name, price, image: imageUrl,
                        calories: document.getElementById('productCalories')?.value.trim() || '---',
                        time: document.getElementById('productTime')?.value.trim() || '---',
                        category,
                        desc: document.getElementById('productDesc')?.value.trim() || 'وصف غير متوفر',
                        createdAt: new Date().toISOString()
                    };

                    const result = await saveToFirebase(productData);
                    
                    if (result.success) {
                        alert('✅ تم حفظ المنتج بنجاح');
                        form.reset();
                        
                        if (urlGroup) {
                            urlGroup.style.display = 'block';
                            document.getElementById('productImageUrl').value = '';
                        }
                        if (fileGroup) {
                            fileGroup.style.display = 'none';
                            document.getElementById('finalImageData').value = '';
                        }
                        const preview = document.getElementById('imagePreview');
                        if (preview) preview.style.display = 'none';
                        
                        await loadProducts();
                    } else {
                        alert('❌ فشل الحفظ: ' + (result.error || 'خطأ غير معروف'));
                    }
                    
                } catch (error) {
                    console.error('❌ خطأ:', error);
                    alert('حدث خطأ: ' + error.message);
                }
            });
        });

        // ================== دوال مساعدة ==================
        window.switchTab = function(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId)?.classList.add('active');
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            
            // تحديث الجدول عند التبديل
            if (tabId === 'products-tab') renderTable();
        };

        // تحميل البيانات
        loadProducts();
    </script>

    <style>
        :root {
            --main: #2b3393;
            --secondary: #f8c81c;
            --light-bg: #f5f6fc;
            --sidebar-width: 250px;
            --shadow: 0 5px 15px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--light-bg);
            display: flex;
            min-height: 100vh;
        }

        /* ===== القائمة الجانبية للجوال ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            overflow-y: auto;
            padding: 20px 0;
            z-index: 100;
            border-left: 1px solid #eee;
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .sidebar-logo img {
            max-height: 50px;
            width: auto;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border-radius: 10px;
            color: #444;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .menu-item i {
            font-size: 1.2rem;
            width: 25px;
            color: var(--main);
        }

        .menu-item.active {
            background: var(--main);
            color: white;
        }

        .menu-item.active i {
            color: white;
        }

        /* ===== المحتوى الرئيسي للجوال ===== */
        .main-content {
            flex: 1;
            margin-right: var(--sidebar-width);
            padding: 20px 15px;
            min-height: 100vh;
            width: calc(100% - var(--sidebar-width));
        }

        /* ===== شريط العلوي للجوال ===== */
        .top-bar {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--main);
            text-align: center;
        }

        .admin-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #eef0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--main);
        }

        /* ===== بطاقات الإحصائيات للجوال ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: #f0f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--main);
            font-size: 1.5rem;
        }

        .stat-info h3 {
            font-size: 0.8rem;
            color: #777;
        }

        .stat-info p {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--main);
        }

        /* ===== نماذج الإدخال للجوال ===== */
        .content-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--main);
            font-size: 0.95rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eef0ff;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #fafbff;
        }

        /* حقل رفع الملفات */
        .file-upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
        }

        .file-upload-area i {
            font-size: 2rem;
            color: var(--main);
        }

        #file-input {
            display: none;
        }

        .image-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 10px;
            margin-top: 10px;
            border: 3px solid var(--secondary);
            display: none;
        }

        .btn-save {
            background: var(--main);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ===== جدول المنتجات للجوال ===== */
        .products-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .products-table th {
            background: #f0f2ff;
            color: var(--main);
            padding: 10px 5px;
            font-weight: 600;
        }

        .products-table td {
            padding: 8px 3px;
            border-bottom: 1px solid #eee;
        }

        .products-table img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }

        .badge-category {
            background: var(--secondary);
            color: var(--main);
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.7rem;
            display: inline-block;
        }

        .action-btn {
            background: none;
            border: none;
            color: #d33;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px;
        }

        /* ===== معاينة آخر المنتجات للجوال ===== */
        #recentProductsPreview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preview-card {
            background: #f0f2ff;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            width: calc(33.33% - 7px);
            min-width: 90px;
        }

        .preview-card img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .preview-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--main);
            margin: 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-price {
            font-size: 0.7rem;
            color: var(--main);
        }

        /* ===== تبويبات ===== */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== رسالة تأكيد ===== */
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--main);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            font-size: 0.9rem;
        }

        .toast-message.show {
            display: flex;
        }

        /* تحسينات للشاشات الصغيرة جداً */
        @media (max-width: 480px) {
            :root {
                --sidebar-width: 70px;
            }
            
            .sidebar-logo img {
                max-height: 35px;
            }
            
            .menu-item span:not(.active) {
                display: none;
            }
            
            .menu-item {
                justify-content: center;
                padding: 12px 5px;
            }
            
            .menu-item i {
                margin: 0;
                font-size: 1.3rem;
            }
            
            .page-title {
                font-size: 1.2rem;
            }
            
            .stat-card {
                padding: 10px;
            }
            
            .stat-icon {
                width: 35px;
                height: 35px;
                font-size: 1.2rem;
            }
            
            .stat-info p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="https://i.imgur.com/9q2D4eN.png" alt="لوجو" onerror="this.src='https://via.placeholder.com/100x50/2b3393/ffffff?text=Admin';">
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="switchTab('add-product-tab', this)">
                <i class="fas fa-plus-circle"></i>
                <span>إضافة</span>
            </div>
            <div class="menu-item" onclick="switchTab('products-tab', this)">
                <i class="fas fa-boxes"></i>
                <span>المنتجات</span>
            </div>
            <div class="menu-item" onclick="switchTab('settings-tab', this)">
                <i class="fas fa-cog"></i>
                <span>الإعدادات</span>
            </div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">لوحة التحكم</h1>
            <div class="admin-info">
                <span>مرحباً، المدير</span>
                <div class="admin-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </div>

        <!-- تبويب: إضافة صنف -->
        <div id="add-product-tab" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-utensils"></i></div>
                    <div class="stat-info">
                        <h3>إجمالي</h3>
                        <p id="totalProducts">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <h3>أقسام</h3>
                        <p>7</p>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <h2 style="color: var(--main); margin-bottom: 15px; font-size: 1.3rem;">
                    <i class="fas fa-plus-circle" style="margin-left: 8px;"></i>إضافة صنف جديد
                </h2>
                
                <form id="addProductForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>اسم الصنف <span style="color: red;">*</span></label>
                            <input type="text" id="productName" placeholder="مثال: رانش صوص" required>
                        </div>
                        
                        <div class="form-group">
                            <label>السعر (ريال) <span style="color: red;">*</span></label>
                            <input type="number" id="productPrice" placeholder="مثال: 12" step="0.01" required>
                        </div>
                        
                        <div class="form-group">
                            <label>صورة المنتج <span style="color: red;">*</span></label>
                            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                                <button type="button" id="urlOptionBtn" class="btn-save" style="padding: 8px; font-size: 0.85rem;">رابط URL</button>
                                <button type="button" id="fileOptionBtn" class="btn-save" style="background: #666; padding: 8px; font-size: 0.85rem;">رفع ملف</button>
                            </div>
                            
                            <div id="urlInputGroup">
                                <input type="url" id="productImageUrl" placeholder="https://example.com/image.png">
                            </div>
                            
                            <div id="fileInputGroup" style="display: none;">
                                <div class="file-upload-area" onclick="document.getElementById('file-input').click()">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <p>اختر صورة</p>
                                    <small>حد أقصى 2 ميجابايت</small>
                                </div>
                                <input type="file" id="file-input" accept="image/*">
                                <img id="imagePreview" class="image-preview" alt="معاينة">
                            </div>
                            <input type="hidden" id="finalImageData">
                        </div>
                        
                        <div class="form-group">
                            <label>السعرات الحرارية</label>
                            <input type="text" id="productCalories" placeholder="مثال: 250 سعرة">
                        </div>
                        
                        <div class="form-group">
                            <label>وقت التجهيز</label>
                            <input type="text" id="productTime" placeholder="مثال: 10 دقائق">
                        </div>
                        
                        <div class="form-group">
                            <label>القسم <span style="color: red;">*</span></label>
                            <select id="productCategory" required>
                                <option value="">-- اختر القسم --</option>
                                <option value="sauces">الصوصات</option>
                                <option value="sandwich">الساندويتش</option>
                                <option value="circles">الدوائر</option>
                                <option value="hummus">الحمسات</option>
                                <option value="drinks">المشروبات</option>
                                <option value="boxes">البوكسات</option>
                                <option value="specials">تشكيلة خاصة</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>وصف قصير</label>
                        <textarea id="productDesc" rows="2" placeholder="وصف مختصر..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn-save"><i class="fas fa-save"></i> حفظ الصنف</button>
